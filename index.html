<script>
// ── PWA Manifest для iOS ──
(function(){
  if(document.querySelector('link[rel="manifest"]')) return;
  const manifest = {name:"METIKENGER",short_name:"METIK",start_url:"./",display:"standalone",background_color:"#07080D",theme_color:"#6366F1",orientation:"portrait",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%236366F1'/%3E%3Ctext y='380' x='60' font-size='380'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]};
  const blob = new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const link = document.createElement('link');
  link.rel='manifest'; link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
})();

// ── Service Worker с фоновым polling ──
(function(){
  if(!('serviceWorker' in navigator)) return;
  const swCode = `
let pollTimer = null;
let username = null;
const FB = 'FIREBASE_URL_PLACEHOLDER';

self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });

self.addEventListener('message', e => {
  if(!e.data) return;
  if(e.data.type==='SET_USER') { username=e.data.username; username?startPoll():stopPoll(); }
  if(e.data.type==='STOP_POLL') stopPoll();
});

function startPoll(){ stopPoll(); pollTimer=setInterval(checkInbox,15000); }
function stopPoll(){ if(pollTimer){clearInterval(pollTimer);pollTimer=null;} }

async function checkInbox(){
  if(!username) return;
  try{
    const r=await fetch(FB+'/inbox/'+username+'.json',{cache:'no-store'});
    if(!r.ok) return;
    const inbox=await r.json();
    if(!inbox) return;
    const items=Object.values(inbox);
    if(!items.length) return;
    const cs=await clients.matchAll({type:'window',includeUncontrolled:true});
    const visible=cs.some(c=>!c.hidden);
    if(visible){ cs.forEach(c=>c.postMessage({type:'CHECK_INBOX'})); return; }
    await fetch(FB+'/inbox/'+username+'.json',{method:'DELETE'});
    for(const item of items.slice(-3)){
      const {fromDisplayName,msg}=item; if(!msg) continue;
      const body=msg.fileType==='sticker'?'🎭 Стикер':msg.fileType==='voice'?'🎙️ Голосовое':msg.fileType==='image'?'📷 Фото':msg.fileType==='gift'?'🎁 '+(msg.giftName||'Подарок'):(msg.text||'').slice(0,80)||'📎 Файл';
      await self.registration.showNotification('✈️ '+(fromDisplayName||'METIKENGER'),{body,icon:'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 rx=%2216%22 fill=%22%236366F1%22/%3E%3Ctext y=%2248%22 x=%228%22 font-size=%2248%22%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E',tag:'metik-'+fromDisplayName,renotify:true,vibrate:[200,100,200],data:{url:'./'}});
    }
  }catch(e){}
}
self.addEventListener('notificationclick',e=>{
  e.notification.close();
  e.waitUntil(clients.matchAll({type:'window',includeUncontrolled:true}).then(cs=>{
    for(const c of cs){if(c.url&&'focus' in c)return c.focus();}
    return clients.openWindow('./');
  }));
});
self.addEventListener('periodicsync',e=>{ if(e.tag==='check-messages') e.waitUntil(checkInbox()); });
  `.replace('FIREBASE_URL_PLACEHOLDER', 'https://metik-72aa2-default-rtdb.europe-west1.firebasedatabase.app');

  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url,{scope:'./'})
    .then(reg=>{
      window._swReg=reg;
      if('periodicSync' in reg) reg.periodicSync.register('check-messages',{minInterval:15000}).catch(()=>{});
    })
    .catch(e=>console.log('SW fail:',e.message));
})();
