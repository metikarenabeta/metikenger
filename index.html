/* iOS Safari full height using JS-set --vh variable */
#root{height:calc(var(--vh,1vh)*100);}
/* Prevent iOS double-tap zoom on buttons */
button,a{touch-action:manipulation;}
/* Prevent iOS input zoom — keep font-size >= 16px */
input,textarea,select{font-family:'DM Sans',system-ui,sans-serif;font-size:16px!important;}
button{font-family:'DM Sans',system-ui,sans-serif;}
/* iOS safe area — always use env() with fallback */
.pt-safe{padding-top:env(safe-area-inset-top,14px);}
.pb-safe{padding-bottom:env(safe-area-inset-bottom,10px);}
/* Scrollable areas must have -webkit-overflow-scrolling */
.scroll-area{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
/* Fix backdrop-filter on older Safari */
.blur-bg{-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);}
/* Scrollbar styling */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.22);}

@keyframes fadeIn{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--glow);}50%{box-shadow:0 0 0 22px transparent;}}
@keyframes toast{0%{opacity:0;transform:translateX(-50%) translateY(-20px) scale(0.8);}65%{transform:translateX(-50%) translateY(2px) scale(1.02);}100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}
@keyframes sheetUp{from{opacity:0;transform:translateY(52px);}to{opacity:1;transform:translateY(0);}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-18px) rotate(2deg);}}
@keyframes dot{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
@keyframes glowAnim{0%,100%{opacity:0.3;}50%{opacity:0.72;}}
@keyframes borderPulse{0%,100%{border-color:var(--ac-30);}50%{border-color:var(--ac);}}
@keyframes slideIn{from{opacity:0;transform:translateX(100%);}to{opacity:1;transform:translateX(0);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes lockBounce{0%,100%{transform:scale(1);}30%{transform:scale(1.18);}60%{transform:scale(0.94);}}
@keyframes secureIn{0%{opacity:0;transform:scale(0.7) rotate(-10deg);}100%{opacity:1;transform:scale(1) rotate(0deg);}}
@keyframes menuIn{0%{opacity:0;transform:scale(0.92) translateY(-8px);}100%{opacity:1;transform:scale(1) translateY(0);}}
@keyframes itemSlide{0%{opacity:0;transform:translateX(-10px);}100%{opacity:1;transform:translateX(0);}}
@keyframes iconPop{0%{transform:scale(0.5);opacity:0;}60%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
@keyframes ripple{0%{transform:scale(0);opacity:0.4;}100%{transform:scale(4);opacity:0;}}
@keyframes msgIn{0%{opacity:0;transform:translateY(14px) scale(0.96);}100%{opacity:1;transform:translateY(0) scale(1);}}
@keyframes slideInRight{0%{opacity:0;transform:translateX(60px);}100%{opacity:1;transform:translateX(0);}}
@keyframes profileSlideUp{0%{opacity:0;transform:translateY(60px);}100%{opacity:1;transform:translateY(0);}}
@keyframes avatarPop{0%{opacity:0;transform:scale(0.5);}60%{transform:scale(1.08);}100%{opacity:1;transform:scale(1);}}
@keyframes ringPulse{0%{box-shadow:0 0 0 0 var(--glow);}70%{box-shadow:0 0 0 14px transparent;}100%{box-shadow:0 0 0 0 transparent;}}
@keyframes infoRowIn{0%{opacity:0;transform:translateX(-16px);}100%{opacity:1;transform:translateX(0);}}
@keyframes giftIn{0%{opacity:0;transform:scale(0.6) rotate(-8deg);}70%{transform:scale(1.1) rotate(2deg);}100%{opacity:1;transform:scale(1) rotate(0deg);}}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-12px) scale(1.05);}}
@keyframes rainbowShift{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
@keyframes comingSoonFloat{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-10px) rotate(1deg);}}
@keyframes exclusiveBg{0%{background-position:0% center;}100%{background-position:200% center;}}
@keyframes settingsCardIn{0%{opacity:0;transform:translateY(16px) scale(0.96);}100%{opacity:1;transform:translateY(0) scale(1);}}
@keyframes chatItemIn{0%{opacity:0;transform:translateX(-12px);}100%{opacity:1;transform:translateX(0);}}
/* Mobile first layout */
.panel{position:absolute;inset:0;display:flex;flex-direction:column;}
.chat-view{position:absolute;inset:0;display:flex;flex-direction:column;animation:slideIn 0.28s cubic-bezier(.16,1,.3,1);}
/* Desktop side-by-side */
@media(min-width:680px){
  .panel{position:relative;width:360px;flex-shrink:0;}
  .panel.fullscreen{position:absolute;inset:0;width:100%;flex-shrink:1;z-index:10;}
  .chat-view{position:relative;flex:1;animation:none;}
}
/* Modal bottom sheet */
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:flex-end;justify-content:center;z-index:1000;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);}
.mb{border-radius:28px 28px 0 0;padding:0 20px 0;width:100%;max-width:600px;animation:sheetUp 0.3s cubic-bezier(.16,1,.3,1);overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:92vh;max-height:calc(var(--vh,1vh)*92);padding-bottom:max(32px,env(safe-area-inset-bottom,32px));}

.ios-fixed{position:sticky;bottom:0;}

// iOS Safari viewport height fix — updates --vh on resize/orientationchange
// This prevents the address bar from cutting off the bottom of the app
(function() {
  function setVH() {
    var vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', vh + 'px');
  }
  setVH();
  window.addEventListener('resize', setVH);
  window.addEventListener('orientationchange', function() {
    setTimeout(setVH, 100);
  });
})();
</script>

/* ── TOAST HOOK ── */
function useToast() {
  const [notif,setNotif] = React.useState("");
  const toast = React.useCallback(m=>{setNotif(m);setTimeout(()=>setNotif(""),3000);},[]);
  return {notif,toast};
}

/* ── GIFT MODAL ── */
function GiftModal({ T, A, straps, setStraps, balloonCount, appleCount, setGifts, setGModal, setTotalBoughtBalloon, setTotalBoughtApple, toast, lang, initialType }) {
  const t = k => (I18N[lang]||I18N.ru)[k] || k;
  const [step,     setStep]     = React.useState(0);
  const [qty,      setQty]      = React.useState(1);
  const [giftType, setGiftType] = React.useState(initialType||"balloon");

  const isBalloon = giftType === "balloon";
  const LIMIT     = isBalloon ? BALLOON_LIMIT : APPLE_LIMIT;
  const curCount  = isBalloon ? balloonCount : appleCount;
  const available = LIMIT - curCount;
  const priceEach = isBalloon ? 5 : 25;
  const emoji     = isBalloon ? "🎈" : "🍏";
  const giftName  = isBalloon ? t("giftBalloonName") : t("giftAppleName");
  const maxCanBuy = Math.min(isBalloon ? 50 : 20, Math.floor(straps / priceEach), available);
  const canBuyAny = maxCanBuy > 0;
  const totalCost = qty * priceEach;
  const canAfford = straps >= totalCost && (curCount + qty) <= LIMIT;

  function close() { setGModal(false); setStep(0); setQty(1); }

  function switchType(t) { setGiftType(t); setQty(1); setStep(0); }

  function buyGifts() {
    if (!canAfford) return;
    const now = Date.now();
    const newGifts = Array.from({length: qty}, (_, i) => ({
      id: now + i, type: giftType, emoji, name: giftName,
      price: priceEach, acquiredAt: now, hidden: false,
      burnDeadline: now + 14*24*60*60*1000
    }));
    setStraps(s => s - totalCost);
    setGifts(g => [...g, ...newGifts]);
    if(isBalloon) setTotalBoughtBalloon(n => n + qty);
    else setTotalBoughtApple(n => n + qty);
    close();
    toast(t("giftBought").replace("{qty}",qty).replace("{left}",available-qty));
  }

  return (
    <div className="mo" onClick={close}>
      <div className="mb" onClick={e=>e.stopPropagation()}>
        <div className="handle" style={{background:T.bo}}/>

        {/* Gift type selector tabs */}
        <div style={{display:"flex",gap:"8px",marginBottom:"20px",background:T.ca,borderRadius:"16px",padding:"5px",border:"1px solid "+T.caB}}>
          {[{id:"balloon",emoji:"🎈",label:t("giftBalloonLabel"),price:5},{id:"apple",emoji:"🍏",label:t("giftAppleLabel"),price:25}].map(opt=>(
            <button key={opt.id} onClick={()=>switchType(opt.id)}
              style={{flex:1,padding:"11px 8px",borderRadius:"12px",border:"none",cursor:"pointer",transition:"all 0.2s",
                background: giftType===opt.id ? "linear-gradient(135deg,"+A.main+","+A.dark+")" : "transparent",
                color: giftType===opt.id ? "#fff" : T.su,
                fontWeight:700,fontSize:"13px",display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",
                boxShadow: giftType===opt.id ? "0 4px 14px "+A.glow : "none"}}>
              <span style={{fontSize:"22px"}}>{opt.emoji}</span>
              <span>{opt.label}</span>
              <span style={{fontSize:"10px",opacity:0.8}}>{opt.price} st.</span>
            </button>
          ))}
        </div>

        {step === 0 && <>
          {/* Header */}
          <div style={{textAlign:"center",marginBottom:"22px"}}>
            <div className="ba" style={{fontSize:"72px",filter:"drop-shadow(0 14px 28px rgba(0,0,0,0.32))",display:"block",marginBottom:"12px"}}>{emoji}</div>
            <div style={{color:T.tx,fontWeight:800,fontSize:"22px",marginBottom:"12px",letterSpacing:"-0.4px",fontFamily:"'Syne',sans-serif"}}>{giftName}</div>
            <div style={{display:"flex",justifyContent:"center",gap:"7px",flexWrap:"wrap"}}>
              <span className="tag" style={{background:A.main+"22",color:A.main,border:"1px solid "+A.main+"33"}}>💰 {priceEach} straps / шт.</span>
              <span className="tag" style={{background:T.ca,color:T.su,border:"1px solid "+T.caB}}>Баланс: {straps}</span>
              {curCount < LIMIT
                ? <span className="tag" style={{background:"#22C55E14",color:"#22C55E",border:"1px solid #22C55E2A"}}>📦 {available} мест</span>
                : <span className="tag" style={{background:"rgba(239,68,68,0.12)",color:"#F87171",border:"1px solid rgba(239,68,68,0.24)"}}>🚫 Лимит</span>
              }
            </div>
          </div>

          {/* Not enough / limit reached warning */}
          {!canBuyAny &&
            <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.18)",borderRadius:"14px",padding:"13px 15px",marginBottom:"16px",display:"flex",gap:"11px",alignItems:"center"}}>
              <span style={{fontSize:"22px"}}>⚠️</span>
              <div>
                {curCount >= LIMIT
                  ? <div style={{color:"#F87171",fontWeight:700,fontSize:"13px"}}>{t("giftLimitReached").replace("{n}",LIMIT)}</div>
                  : <><div style={{color:"#F87171",fontWeight:700,fontSize:"13px"}}>{t("giftNeedMore").replace("{n}",priceEach)}</div>
                     <div style={{color:"rgba(248,113,113,0.65)",fontSize:"11px",marginTop:"2px"}}>{t("giftRefill")}</div></>
                }
              </div>
            </div>
          }

          {/* Quantity picker — SLIDER ONLY */}
          {canBuyAny && <>
            <div style={{background:T.ca,border:"1px solid "+T.caB,borderRadius:"18px",padding:"18px 16px",marginBottom:"14px"}}>
              <div style={{color:T.mu,fontSize:"9px",fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"14px",textAlign:"center"}}>{t("giftQty")}</div>

              {/* Big qty display */}
              <div style={{textAlign:"center",marginBottom:"16px"}}>
                <div style={{color:T.tx,fontSize:"56px",fontWeight:800,letterSpacing:"-3px",lineHeight:1,fontFamily:"'Syne',sans-serif"}}>{qty}</div>
                <div style={{color:T.mu,fontSize:"11px",fontWeight:600,marginTop:"4px"}}>{t("giftQtyUnit")}</div>
              </div>

              {/* Slider */}
              <div style={{padding:"0 4px",marginBottom:"8px"}}>
                <style>{`
                  .gift-slider{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;outline:none;cursor:pointer;}
                  .gift-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,${A.main},${A.dark});cursor:pointer;box-shadow:0 4px 14px ${A.glow};border:2px solid rgba(255,255,255,0.3);}
                  .gift-slider::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,${A.main},${A.dark});cursor:pointer;box-shadow:0 4px 14px ${A.glow};border:2px solid rgba(255,255,255,0.3);}
                `}</style>
                <input type="range" className="gift-slider" min="1" max={maxCanBuy} value={qty}
                  onChange={e=>setQty(Number(e.target.value))}
                  style={{background:`linear-gradient(to right, ${A.main} 0%, ${A.main} ${((qty-1)/(maxCanBuy-1||1))*100}%, ${T.bo} ${((qty-1)/(maxCanBuy-1||1))*100}%, ${T.bo} 100%)`}}
                />
                <div style={{display:"flex",justifyContent:"space-between",marginTop:"6px"}}>
                  <span style={{color:T.mu,fontSize:"10px",fontWeight:600}}>1</span>
                  <span style={{color:T.mu,fontSize:"10px",fontWeight:600}}>{maxCanBuy}</span>
                </div>
              </div>

              {/* Cost summary */}
              <div style={{background:T.pa,borderRadius:"12px",padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:T.mu,fontSize:"12px",fontWeight:600}}>{t("giftTotal")}</span>

/* ── GIFT DETAIL ── */
function GiftDetail({ T, A, giftDetail, setGiftDetail, setGifts, setStraps, toast, lang }) {
  const t = k => (I18N[lang]||I18N.ru)[k] || k;
  if (!giftDetail) return null;
  const g = giftDetail;
  const canBurn = Date.now() < g.burnDeadline;
  const daysLeft = Math.max(0, Math.ceil((g.burnDeadline - Date.now())/(1000*60*60*24)));
  const burnReturn = Math.round(g.price * 0.9);
  function close() { setGiftDetail(null); }
  function toggleHide() {
    const u = {...g, hidden:!g.hidden};
    setGifts(p => p.map(x => x.id===g.id ? u : x));
    setGiftDetail(u);
    toast(g.hidden ? t("shownNow") : t("hiddenNow"));
  }
  function burnGift() {
    setGifts(p => p.filter(x => x.id!==g.id));
    setStraps(s => s + burnReturn);
    close();
    toast("🔥 Подарок сожжён · +"+burnReturn+" straps");
  }
  return (
    <div className="mo" onClick={close}>
      <div className="mb" onClick={e=>e.stopPropagation()}>
        <div className="handle"/>
        <div style={{textAlign:"center",marginBottom:"24px"}}>
          <div className="ba" style={{fontSize:"72px",marginBottom:"14px",display:"block",filter:"drop-shadow(0 12px 24px rgba(0,0,0,0.28))"}}>{g.emoji}</div>
          <div style={{color:T.tx,fontWeight:800,fontSize:"24px",marginBottom:"12px",letterSpacing:"-0.4px"}}>{g.name}</div>
          <div style={{display:"flex",gap:"7px",justifyContent:"center",flexWrap:"wrap"}}>
            <span className="tag" style={{background:A.main+"22",color:A.main,border:"1px solid "+A.main+"33"}}>💰 {g.price} straps</span>
            <span className="tag" style={{background:T.ca,color:T.su,border:"1px solid "+T.caB}}>📅 {new Date(g.acquiredAt).toLocaleDateString("ru")}</span>
            {g.hidden && <span className="tag" style={{background:"rgba(120,120,120,0.12)",color:T.mu,border:"1px solid "+T.caB}}>🙈 Скрыт</span>}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"9px"}}>
          <button onClick={toggleHide} className="ghs" style={{width:"100%",padding:"13px",fontSize:"13px"}}>
            {g.hidden ? "👁 Показать всем" : "🙈 Скрыть"}
          </button>
          <button onClick={()=>toast("✨ Улучшение подарков — скоро!")}
            style={{width:"100%",padding:"13px",fontSize:"13px",fontWeight:700,borderRadius:"14px",
              background:"linear-gradient(135deg,"+A.main+"18,"+A.dark+"0c)",
              border:"1.5px solid "+A.main+"44",color:A.main,cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",transition:"all 0.2s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="linear-gradient(135deg,"+A.main+"28,"+A.dark+"18)";}}
            onMouseLeave={e=>{e.currentTarget.style.background="linear-gradient(135deg,"+A.main+"18,"+A.dark+"0c)";}}>
            <span style={{fontSize:"16px"}}>✨</span>
            <span>Улучшить</span>
            <span style={{fontSize:"9px",fontWeight:800,background:A.main+"22",border:"1px solid "+A.main+"33",borderRadius:"6px",padding:"2px 6px"}}>СКОРО</span>
          </button>
          {canBurn
            ? <button onClick={burnGift} style={{width:"100%",padding:"13px",fontSize:"13px",borderRadius:"14px",background:"rgba(239,68,68,0.08)",color:"#F87171",border:"1px solid rgba(239,68,68,0.22)",cursor:"pointer",fontWeight:700,transition:"all 0.18s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(239,68,68,0.15)";}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(239,68,68,0.08)";}}>
                🔥 Сжечь · {daysLeft} дн. осталось
              </button>
            : <div style={{background:T.ca,borderRadius:"13px",padding:"12px",textAlign:"center",border:"1px solid "+T.caB}}>
                <span style={{color:T.mu,fontSize:"12px",fontWeight:600}}>⏰ Срок сжигания истёк</span>
              </div>
          }
        </div>
        <button onClick={close} style={{display:"block",width:"100%",padding:"12px",background:"none",border:"none",color:T.mu,cursor:"pointer",fontSize:"12px",marginTop:"12px",fontWeight:600}}>
          Закрыть
        </button>
      </div>
    </div>
  );
}

/* ── CREATE CHANNEL MODAL ── */
function CreateChannelModal({ T, A, setCreateChannel, setChats, toast, lang }) {
  const t = k => (I18N[lang]||I18N.ru)[k] || k;
  const [nm,   setNm]   = React.useState("");
  const [cid,  setCid]  = React.useState("");
  const [desc, setDesc] = React.useState("");
  const [av,   setAv]   = React.useState(null);
  const ref = React.useRef(null);

  function create() {
    if (!nm.trim()) { toast("⚠️ Введите название"); return; }
    if (!cid.trim()) { toast("⚠️ Введите ID канала"); return; }
    const cleanId = cid.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
    if (cleanId.length < 3) { toast("⚠️ ID мин. 3 символа (a-z, 0-9, _)"); return; }
    const emojis = ["📢","🌟","🔥","💫","🎯","🎵","⚡","🏆"];
    const nc = {
      id: Date.now(),
      name: nm.trim(),
      channelId: cleanId,
      avatar: av ? null : emojis[Math.floor(Math.random()*emojis.length)],
      avatarImg: av,
      color: UCOLORS[Math.floor(Math.random()*UCOLORS.length)],
      lastMsg: desc.trim() || t("channelCreated"),
      time: "сейчас", unread:0, isChannel:true, isAI:false, isOwned:true, desc:desc.trim(),
      messages:[{id:1,from:"them",text:"📢 Канал «"+nm.trim()+"» создан!"+(desc.trim()?" — "+desc:""),time:new Date().toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"})}]
    };
    setChats(c=>[nc,...c]);
    setCreateChannel(false);
    toast("✅ Канал @"+cleanId+" создан!");
  }
  return (
    <div className="mo" onClick={()=>setCreateChannel(false)}>
      <div className="mb" onClick={e=>e.stopPropagation()}>
        <div className="handle"/>
        <div style={{color:T.tx,fontWeight:700,fontSize:"20px",marginBottom:"24px",letterSpacing:"-0.4px"}}>📢 Новый канал</div>

            {av ? <img src={av} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{fontSize:"30px"}}>📷</span>}
          </div>
          <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>setAv(ev.target.result);r.readAsDataURL(f);}}}/>
          <span style={{color:T.mu,fontSize:"11px"}}>{t("clickForAvatar")}</span>
        </div>

        {/* НАЗВАНИЕ */}
        <div style={{marginBottom:"14px"}}>
          <div style={{color:T.mu,fontSize:"9px",fontWeight:700,letterSpacing:"1.5px",marginBottom:"7px",textTransform:"uppercase"}}>НАЗВАНИЕ *</div>

        </div>

        <div style={{marginBottom:"14px"}}>
          <div style={{color:T.mu,fontSize:"9px",fontWeight:700,letterSpacing:"1.5px",marginBottom:"7px",textTransform:"uppercase"}}>ID КАНАЛА *</div>

      </div>

/* --- 1. Crypto helpers --- */
const _enc = new TextEncoder();
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", _enc.encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function genSalt(bytes=18) {
  return Array.from(crypto.getRandomValues(new Uint8Array(bytes)))
    .map(b=>b.toString(16).padStart(2,"0")).join("");
}
function genToken(bytes=32) {
  return Array.from(crypto.getRandomValues(new Uint8Array(bytes)))
    .map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function pbkdf2Hash(password, salt) {
  const keyMat = await crypto.subtle.importKey("raw", _enc.encode(password), "PBKDF2", false, ["deriveBits"]);
  const bits   = await crypto.subtle.deriveBits(
    { name:"PBKDF2", salt:_enc.encode(salt), iterations:100_000, hash:"SHA-256" },
    keyMat, 256
  );
  return Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* --- 2. Rate limiter --- */
const _rl = {};
function rlCheck(username, t) {
  const L = t || (k=>k);
  const now = Date.now(), k = username.toLowerCase();
  if (!_rl[k]) _rl[k] = { n:0, first:now, until:0 };
  const r = _rl[k];
  if (now < r.until) {
    const sec = Math.ceil((r.until - now)/1000);
    return { blocked:true, msg:L("errBlocked").replace("{n}",sec) };
  }
  if (now - r.first > 300_000) { r.n=0; r.first=now; }
  r.n++;
  if (r.n >= 5) {
    const wait = Math.min(30 * 2**(r.n-5), 3600);
    r.until = now + wait*1000;
    return { blocked:true, msg:L("errLockedOut").replace("{n}",wait) };
  }
  return { blocked:false };
}
function rlReset(username) { delete _rl[username.toLowerCase()]; }

/* --- 3. Input sanitization --- */
function sanitizeUsername(raw) {
  return String(raw).trim().toLowerCase().replace(/[^a-z0-9_]/g,"").slice(0,32);
}
function sanitizeDisplayName(s) {
  return String(s||"").replace(/[<>"'`\\]/g,"").trim().slice(0,32);
}
function escapeHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#x27;");
}
function validatePassword(p) {
  if (!p) return 0;
  if (p.length > 128)      return "Пароль слишком длинный (макс. 128)";
  return null;
}
function pwStrength(p) {
  let s=0;
  if(p.length>=8)  s++;
  if(p.length>=12) s++;
  if(/[0-9]/.test(p)) s++;
  if(/[A-Z]/.test(p)) s++;
  if(/[^a-zA-Z0-9]/.test(p)) s++;
  return s; // 0..5
}

function fmtVoiceTime(s) {
  s = Math.max(0, Math.floor(s||0));
  return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
}

/* ── VoiceBubble component ── */
function VoiceBubble({src,dur,time,alignRight,acMain,timeColor}) {
  const {useState,useRef,useEffect} = React;
  const [playing,  setPlaying]  = useState(false);
  const [progress, setProgress] = useState(0);
  const [curSec,   setCurSec]   = useState(0);
  const [ready,    setReady]    = useState(false);
  const [errored,  setErrored]  = useState(false);
  const audioRef = useRef(null);
  const rafRef   = useRef(null);

  useEffect(()=>{
    if(!src) return;
    const audio = new Audio();
    audioRef.current = audio;
    audio.preload = "auto";

    const markReady = ()=>setReady(true);
    const onError = (e)=>{ console.error("VoiceBubble error",e); setErrored(true); };
    const onEnded = ()=>{ setPlaying(false); setProgress(0); setCurSec(0); cancelAnimationFrame(rafRef.current); };

    // Listen to multiple events — Safari fires different ones than Chrome
    audio.addEventListener("canplay",       markReady);
    audio.addEventListener("canplaythrough",markReady);
    audio.addEventListener("loadeddata",    markReady);
    audio.addEventListener("loadedmetadata",markReady);
    audio.addEventListener("error",  onError);
    audio.addEventListener("ended",  onEnded);

    audio.src = src;
    audio.load();

    return ()=>{
      cancelAnimationFrame(rafRef.current);
      audio.pause();
      audio.removeEventListener("canplay",       markReady);
      audio.removeEventListener("canplaythrough",markReady);
      audio.removeEventListener("loadeddata",    markReady);
      audio.removeEventListener("loadedmetadata",markReady);
      audio.removeEventListener("error",  onError);
      audio.removeEventListener("ended",  onEnded);
      audio.src = "";
    };
  },[src]);

  function tick(){
    const audio = audioRef.current;
    if(!audio) return;
    const d = audio.duration||0;
    if(d>0){ setProgress(audio.currentTime/d*100); setCurSec(audio.currentTime); }
    if(!audio.paused && !audio.ended) rafRef.current = requestAnimationFrame(tick);
  }

  function togglePlay(){
    const audio = audioRef.current;
    if(!audio) return;
    if(playing){
      audio.pause();
      cancelAnimationFrame(rafRef.current);
      setPlaying(false);
    } else {
      // On iOS Safari, play() must be called from a user gesture — this handler qualifies
      const p = audio.play();
      if(p && typeof p.then==="function"){
        p.then(()=>{ setPlaying(true); rafRef.current=requestAnimationFrame(tick); setReady(true); })
         .catch(err=>{ console.warn("voice play error:", err); setErrored(true); });
      } else {
        setPlaying(true); rafRef.current=requestAnimationFrame(tick);
      }
    }
  }

  function seek(e){
    const audio=audioRef.current;
    if(!audio||!audio.duration) return;
    const r=e.currentTarget.getBoundingClientRect();
    const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    audio.currentTime=pct*audio.duration;
    setProgress(pct*100); setCurSec(audio.currentTime);
  }

  const totalSec  = (audioRef.current && audioRef.current.duration && isFinite(audioRef.current.duration))
                    ? audioRef.current.duration : (dur||0);
  const showTime  = playing ? fmtVoiceTime(curSec) : fmtVoiceTime(totalSec);
  const barBg     = alignRight ? "rgba(255,255,255,0.25)" : "rgba(130,130,130,0.2)";
  const fillBg    = alignRight ? "rgba(255,255,255,0.9)"  : acMain;
  const playBg    = alignRight ? "rgba(255,255,255,0.2)"  : acMain+"28";

  if(errored) return (
    <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"4px 2px",color:timeColor,fontSize:"11px",opacity:0.55}}>
      🎙️ Не удалось загрузить
    </div>
  );

  return (
    <div style={{display:"flex",alignItems:"center",gap:"10px",minWidth:"200px",padding:"2px 2px 6px"}}>
      <button onClick={togglePlay}
        style={{width:"40px",height:"40px",borderRadius:"50%",background:playBg,border:"none",
          cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:"17px",flexShrink:0,transition:"transform 0.15s",opacity:1}}
        onMouseEnter={e=>{ e.currentTarget.style.transform="scale(1.1)"; }}
        onMouseLeave={e=>e.currentTarget.style.transform=""}>
        {playing ? "⏸" : "▶"}
      </button>
      <div style={{flex:1,minWidth:0}}>
        <div onClick={seek}
          style={{height:"4px",borderRadius:"2px",background:barBg,marginBottom:"6px",
            overflow:"hidden",cursor:"pointer"}}>
          <div style={{height:"100%",borderRadius:"2px",background:fillBg,
            width:progress+"%",transition:playing?"none":"width 0.12s"}}/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
          <span style={{color:timeColor,fontSize:"10px",fontWeight:700,
            fontVariantNumeric:"tabular-nums"}}>{showTime}</span>
          <span style={{fontSize:"9px",opacity:0.4}}>🎙️</span>
        </div>
      </div>
      <div style={{color:timeColor,fontSize:"10px",fontWeight:600,alignSelf:"flex-end",whiteSpace:"nowrap"}}>
        {time}{alignRight&&" ✓✓"}
      </div>
    </div>
  );
}

  function getSupportedMime() {
    if(typeof MediaRecorder === "undefined") return "";
    // Safari only supports audio/mp4 — must be first
    const types = ["audio/mp4","audio/mp4;codecs=mp4a.40.2","audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus"];
    for(const type of types) {
      try { if(MediaRecorder.isTypeSupported(type)) return type; } catch(e){}
    }
    return "";
  }

  async function startVoice() {
    if(voiceRecording) return;
    if(typeof MediaRecorder === "undefined") {
      toast("🎙️ Ваш браузер не поддерживает запись"); return;
    }
    try {
      // Simple constraints — Safari rejects sampleRate/echoCancellation on some versions
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current = stream;
      audioChunksRef.current = [];

      const mime = getSupportedMime();
      const mr = mime ? new MediaRecorder(stream,{mimeType:mime}) : new MediaRecorder(stream);

      mr.ondataavailable = e => { if(e.data && e.data.size>0) audioChunksRef.current.push(e.data); };
      mediaRecorderRef.current = mr;
      mr.start(500); // 500ms timeslice — safer for Safari
      voiceStartRef.current = Date.now();
      setVoiceRecording(true);
      setVoiceTimer(0);
      setVoiceLocked(false);
      voiceTimerRef.current = setInterval(()=>{
        setVoiceTimer(Math.floor((Date.now()-voiceStartRef.current)/1000));
      },500);
    } catch(e) {
      console.error("voice start:", e);
      toast("🎙️ Нет доступа к микрофону");
    }
  }
  function stopVoice(send=true) {
    if(!mediaRecorderRef.current) return;
    clearInterval(voiceTimerRef.current);
    const mr          = mediaRecorderRef.current;
    const startTime   = voiceStartRef.current;
    const currentChatId = chatId;

    mr.onstop = () => {
      // Stop mic tracks via streamRef (more reliable than mr.stream)
      if(streamRef.current) {
        streamRef.current.getTracks().forEach(tr=>tr.stop());
        streamRef.current = null;
      }

      if(!send || audioChunksRef.current.length === 0) {
        audioChunksRef.current = [];
        return;
      }

      // Use the actual recorded mime (important for Safari mp4)
      const mimeType = mr.mimeType || "audio/webm";
      const blob = new Blob(audioChunksRef.current, {type: mimeType});
      audioChunksRef.current = [];

      const reader = new FileReader();
      reader.onload = ev => {
        const dataUrl = ev.target.result;
        const dur = Math.max(1, Math.floor((Date.now() - startTime) / 1000));
        const ac = chats.find(c=>c.id===currentChatId);
        if(!ac) return;
        const timeLocale = lang==="en" ? "en" : "ru";
        const nm = {
          id: Date.now(), from: "me",
          text: "🎙️ Голосовое сообщение",
          time: new Date().toLocaleTimeString(timeLocale,{hour:"2-digit",minute:"2-digit"}),
          fileType: "voice",
          fileData: dataUrl,
          voiceDuration: dur,
          senderName: (ac.isChannel||ac.isGroup) ? (user.displayName||user.username) : null,
        };
        setChats(c=>c.map(x=>x.id===currentChatId
          ? {...x, lastMsg:"🎙️ Голосовое", time:"сейчас", messages:[...x.messages, nm]}
          : x
        ));
        playMsg();
        if(ac.isAI) {
          setTimeout(()=>{
            const am = {
              id: Date.now()+1, from:"them",
              text: "🎙️ Голосовое получено! Я воспринимаю только текст, но услышал тебя 😊",
              time: new Date().toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"})
            };
            setChats(c=>c.map(x=>x.id===currentChatId?{...x,messages:[...x.messages,am]}:x));
          }, 1200);
        }
      };
      reader.readAsDataURL(blob);
    };

    // Request final data before stopping
    if(mr.state === "recording") mr.requestData();
    mr.stop();

    setVoiceRecording(false);
    setVoiceLocked(false);
    setVoiceTimer(0);
  }

    const rawU=form.u.trim(), rawN=form.name.trim(), rawP=form.p.trim();
    if(!rawU||!rawN||!rawP){setFerr("Заполните все поля");return;}
    if(rawN.length<2){setFerr("Имя мин. 2 символа");return;}

    if(rawU.length<3){setFerr("Логин мин. 3 символа");return;}
    if(/[^\x20-\x7E]/.test(rawP)){setFerr("Пароль: только латинские символы");return;}
    if(rawP.length<6){setFerr("Пароль мин. 6 символов");return;}

    if(accounts.find(a=>a.username===rawU.toLowerCase())){setFerr("Этот логин уже занят");return;}
    const u = sanitizeUsername(rawU);
    const salt = genSalt();
    const hash = await pbkdf2Hash(rawP, salt+"::"+u);
    const token = genToken();
    const nu={
      username:u, passwordHash:hash, salt, sessionToken:token,
      avatar:u[0].toUpperCase(), color:UCOLORS[accounts.length%UCOLORS.length],
      displayName:sanitizeDisplayName(rawN)||u, phone:"", bio:"Привет! Я использую METIKENGER", joinDate:Date.now()

  async function doLog() {
    const rawU=form.u.trim(), rawP=form.p.trim();
    if(!rawU||!rawP){setFerr(t("errFill"));return;}
    const u = sanitizeUsername(rawU);
    /* Rate-limit check */
    const rl = rlCheck(u, t);
    if(rl.blocked){setFerr(rl.msg);return;}
    /* Constant-time base delay — prevents user enumeration via timing */
    const delay = ms => new Promise(r=>setTimeout(r,ms));
    const found = accounts.find(a=>a.username===u);
    if(!found){
      await delay(420 + Math.random()*180);
      setFerr(t("errWrong"));
      return;
    }
    /* Support legacy SHA-256 hashes — upgrade on first login */
    let hash;
    if(found.salt){
      hash = await pbkdf2Hash(rawP, found.salt+"::"+u);
    } else {
      hash = await sha256(rawP);
    }
    if(hash !== found.passwordHash){
      await delay(420 + Math.random()*180);
      setFerr(t("errWrong"));
      return;
    }
    /* Upgrade legacy hash to PBKDF2 silently */
    let acc = found;
    if(!found.salt){
      const salt = genSalt();
      const newHash = await pbkdf2Hash(rawP, salt+"::"+u);
      acc = {...found, salt, passwordHash:newHash};
      setAccounts(a=>a.map(x=>x.username===u?acc:x));
    }
    /* Regenerate session token */
    acc = {...acc, sessionToken:genToken()};
    setAccounts(a=>a.map(x=>x.username===u?acc:x));
    // Restore saved straps and gifts from account
    setStraps(acc.straps || 0);
    setGifts(acc.gifts || []);
    setUser(acc); setScreen("main"); setForm({u:"",p:""}); setFerr("");
    rlReset(u);
  }

                  <div style={{padding:"11px 15px 10px",borderBottom:"1px solid "+T.bo+"44",background:"linear-gradient(135deg,"+A.main+"08,transparent)"}}>
                    <div style={{color:A.main,fontSize:"9px",fontWeight:800,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"3px"}}>{mm.msg.from==="me"?"✦ Вы":"✦ Собеседник"}</div>
                    <div style={{color:T.su,fontSize:"12px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"180px",fontWeight:500}}>{mm.msg.text.slice(0,55)}{mm.msg.text.length>55?"…":""}</div>
                  </div>
                )}
                {[
                  {icon:"↩",label:"Ответить",color:A.main,accent:true,fn:()=>{setReplyTo(mm.msg);setMsgMenu(null);}},
                  {icon:"⎘",label:"Копировать",color:T.tx,accent:false,fn:()=>{navigator.clipboard&&navigator.clipboard.writeText(mm.msg.text||"");toast("📋 Скопировано");setMsgMenu(null);}},
                  {icon:"↗",label:"Переслать",color:T.tx,accent:false,fn:()=>{toast("↪️ Скоро!");setMsgMenu(null);}},
                  ...(mm.msg.from==="me"?[
                    {icon:"✕",label:"Удалить у себя",color:"#F87171",accent:false,del:true,fn:()=>{setChats(c=>c.map(x=>x.id===chatId?{...x,messages:x.messages.filter(mx=>mx.id!==mm.msg.id)}:x));setMsgMenu(null);toast("🗑️ Удалено");}},
                    {icon:"✕",label:"Удалить у всех",color:"#EF4444",accent:false,del:true,fn:()=>{setChats(c=>c.map(x=>x.id===chatId?{...x,messages:x.messages.filter(mx=>mx.id!==mm.msg.id)}:x));setMsgMenu(null);toast("🗑️ Удалено у всех");}},
                  ]:[
                    {icon:"✕",label:"Удалить у себя",color:"#F87171",accent:false,del:true,fn:()=>{setChats(c=>c.map(x=>x.id===chatId?{...x,messages:x.messages.filter(mx=>mx.id!==mm.msg.id)}:x));setMsgMenu(null);toast("🗑️ Удалено");}},
                  ])
                ].map((it,i,arr)=>(
                  <button key={i} onClick={it.fn}
                    style={{display:"flex",alignItems:"center",gap:"12px",width:"100%",padding:"12px 15px",background:"none",border:"none",cursor:"pointer",
                      borderBottom:i<arr.length-1?"1px solid "+T.bo+"28":"none",
                      color:it.color,fontSize:"13.5px",fontWeight:600,textAlign:"left",
                      transition:"background 0.15s,transform 0.12s",fontFamily:"inherit",
                      animation:"itemSlide 0.2s cubic-bezier(.16,1,.3,1) both",
                      animationDelay:(i*0.04)+"s"}}
                    onMouseEnter={e=>{e.currentTarget.style.background=it.del?"rgba(239,68,68,0.08)":it.accent?A.main+"10":T.caH;e.currentTarget.style.transform="translateX(2px)";}}
                    onMouseLeave={e=>{e.currentTarget.style.background="none";e.currentTarget.style.transform="";}}>
                    <div style={{
                      width:"34px",height:"34px",borderRadius:"11px",flexShrink:0,
                      background:it.del?"rgba(239,68,68,0.12)":it.accent?"linear-gradient(135deg,"+A.main+"30,"+A.dark+"18)":T.ca,
                      border:"1px solid "+(it.del?"rgba(239,68,68,0.2)":it.accent?A.main+"33":T.bo+"55"),
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:"15px",fontWeight:900,color:it.color,
                      boxShadow:it.accent?"0 4px 12px "+A.glow+"44":"none",
                      animation:"iconPop 0.25s cubic-bezier(.16,1,.3,1) both",
                      animationDelay:(i*0.04+0.05)+"s"
                    }}>{it.icon}</div>
                    <span style={{flex:1,letterSpacing:"0.1px"}}>{it.label}</span>
                    {it.accent&&<div style={{width:"6px",height:"6px",borderRadius:"50%",background:A.main,boxShadow:"0 0 8px "+A.glow,flexShrink:0}}/>}
                  </button>
                ))}
                {/* Bottom safe padding */}
                <div style={{height:"4px"}}/>
              </div>
              );
            })()}
            {aiLoading && (
              <div style={{display:"flex",justifyContent:"flex-start",animation:"fadeUp 0.2s ease"}}>
                <div style={{width:"36px",height:"36px",borderRadius:"50%",background:"linear-gradient(135deg,"+A.main+","+A.dark+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"15px",fontWeight:900,flexShrink:0,marginRight:"9px",alignSelf:"flex-end",boxShadow:"0 4px 16px "+A.glow}}>✦</div>
                <div style={{background:"linear-gradient(135deg,"+A.main+"18,"+A.dark+"0a)",borderRadius:"20px 20px 20px 4px",padding:"14px 18px",border:"1px solid "+A.main+"24",display:"flex",gap:"5px",alignItems:"center"}}>
                  <span className="d1" style={{width:"7px",height:"7px",borderRadius:"50%",background:A.main,display:"inline-block"}}/>
                  <span className="d2" style={{width:"7px",height:"7px",borderRadius:"50%",background:A.main,display:"inline-block"}}/>
                  <span className="d3" style={{width:"7px",height:"7px",borderRadius:"50%",background:A.main,display:"inline-block"}}/>
                </div>
              </div>
            )}
            <div ref={endRef}/>
          </div>

          {/* Reply preview */}
          {replyTo && (
            <div style={{padding:"10px 15px",background:T.pa,borderTop:"1px solid "+T.bo+"44",display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{flex:1,background:T.msg,borderRadius:"10px",padding:"8px 12px",borderLeft:"3px solid "+A.main}}>
                <div style={{color:A.main,fontSize:"11px",fontWeight:700,marginBottom:"2px"}}>{replyTo.from==="me"?"Вы":"ИИ"}</div>
                <div style={{color:T.su,fontSize:"12px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{replyTo.text.slice(0,70)}...</div>
              </div>
              <button className="ib" onClick={()=>setReplyTo(null)} style={{color:T.mu,width:"32px",height:"32px",fontSize:"18px"}}>×</button>
            </div>
          )}

          {/* Input */}
          {/* Баннер заблокирован */}
          {blockedContacts.includes(chatId) && (
            <div style={{padding:"14px 20px",background:T.pa,borderTop:"1px solid "+T.bo+"44",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"20px"}}>🚫</span>
                <span style={{color:T.mu,fontSize:"13px",fontWeight:600}}>Контакт заблокирован</span>
              </div>
              <button onClick={()=>{setBlockedContacts(b=>b.filter(x=>x!==chatId));toast("✅ Разблокировано");}}
                style={{background:"rgba(34,197,94,0.1)",color:"#22C55E",border:"1px solid rgba(34,197,94,0.2)",borderRadius:"12px",padding:"8px 16px",fontSize:"12px",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                🔓 Разблокировать
              </button>
            </div>
          )}
          {(!activeChat.isChannel || activeChat.isOwned) && !blockedContacts.includes(chatId) ? (
            <div style={{paddingTop:"10px",paddingLeft:"12px",paddingRight:"12px",
              paddingBottom:"max(10px,env(safe-area-inset-bottom,0px))",
              background:T.pa,borderTop:"1px solid "+T.bo,
              display:"flex",gap:"8px",alignItems:"center",flexShrink:0,position:"relative"}}>
              {/* hidden file input for direct use */}
              <input ref={fileInputRef} type="file" style={{display:"none"}} onChange={e=>{setFileMenu(false);sendFile(e);}}/>

              {/* Emoji button */}
              <div style={{position:"relative",flexShrink:0}}>
                <button onClick={()=>{setEmojiPanel(v=>!v);setFileMenu(false);}}
                  style={{width:"42px",height:"42px",borderRadius:"14px",border:"1.5px solid "+(emojiPanel?A.main:T.inB),background:emojiPanel?"linear-gradient(135deg,"+A.main+"22,"+A.dark+"12)":T.in,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",flexShrink:0,fontSize:"20px"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=A.main;}}
                  onMouseLeave={e=>{if(!emojiPanel)e.currentTarget.style.borderColor=T.inB;}}>
                  😊
                </button>
                {emojiPanel && (
                  <div onClick={e=>e.stopPropagation()} style={{position:"absolute",bottom:"52px",left:"0",background:T.pa,border:"1px solid "+T.bo,borderRadius:"20px",padding:"12px",zIndex:600,width:"min(300px,calc(100vw - 32px))",boxShadow:"0 -8px 40px rgba(0,0,0,0.5)",animation:"sheetUp 0.22s cubic-bezier(.16,1,.3,1)"}}>
                    <div style={{display:"flex",gap:"4px",marginBottom:"10px",background:T.ca,borderRadius:"12px",padding:"3px"}}>
                      {[{id:"emoji",label:"😊 Эмодзи"},...STICKER_PACKS.map(p=>({id:p.id,label:p.label}))].map(stab=>(
                        <button key={stab.id} onClick={()=>setEmojiTab(stab.id)}
                          style={{flex:1,padding:"5px 2px",borderRadius:"9px",border:"none",cursor:"pointer",fontSize:"10px",fontWeight:700,
                            background:emojiTab===stab.id?"linear-gradient(135deg,"+A.main+","+A.dark+")":"transparent",
                            color:emojiTab===stab.id?"#fff":T.mu,transition:"all 0.18s",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                          {stab.label}
                        </button>
                      ))}
                    </div>
                    {emojiTab==="emoji" ? (
                      <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:"4px"}}>
                        {["😀","😂","😅","😍","🥰","😎","🤩","🥳","😏","😢","😭","😤","🤬","😱","🤯","😳","😴","🤔","😎","👍","👎","❤️","🔥","✨","💯","🎉","🙏","👏","💪","🤝","🍕","🍔","🎮","🎵","🚀","⭐","💎","🌈","🦋","🐱"].map((em,i)=>(
                          <button key={i} onClick={()=>{setMsg(v=>(v+em).slice(0,MAX_MSG));setEmojiPanel(false);}}
                            style={{width:"30px",height:"30px",fontSize:"18px",background:"none",border:"none",cursor:"pointer",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.1s"}}
                            onMouseEnter={e=>e.currentTarget.style.background=T.caH}
                            onMouseLeave={e=>e.currentTarget.style.background="none"}>
                            {em}
                          </button>
                        ))}
                      </div>
                    ) : (
                      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"6px"}}>
                        {(STICKER_PACKS.find(p=>p.id===emojiTab)||STICKER_PACKS[0]).stickers.map((st,i)=>(
                          <button key={i} onClick={()=>sendSticker(st)}
                            style={{width:"48px",height:"48px",fontSize:"30px",background:T.ca,border:"1.5px solid "+T.caB,cursor:"pointer",borderRadius:"12px",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}
                            onMouseEnter={e=>{e.currentTarget.style.background=T.caH;e.currentTarget.style.transform="scale(1.18)";e.currentTarget.style.borderColor=A.main+"66";}}
                            onMouseLeave={e=>{e.currentTarget.style.background=T.ca;e.currentTarget.style.transform="scale(1)";e.currentTarget.style.borderColor=T.caB;}}>
                            {st}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* File attach button with popup menu */}
              <div style={{position:"relative",flexShrink:0}}>
                <button onClick={()=>{setFileMenu(v=>!v);setEmojiPanel(false);}}
                  style={{width:"42px",height:"42px",borderRadius:"14px",border:"1.5px solid "+(fileMenu?A.main:T.inB),background:fileMenu?"linear-gradient(135deg,"+A.main+"22,"+A.dark+"12)":T.in,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",flexShrink:0,position:"relative"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=A.main;e.currentTarget.style.background="linear-gradient(135deg,"+A.main+"18,"+A.dark+"0a)";}}
                  onMouseLeave={e=>{if(!fileMenu){e.currentTarget.style.borderColor=T.inB;e.currentTarget.style.background=T.in;}}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={fileMenu?A.main:T.su} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                  </svg>
                </button>
                {fileMenu && <FileAttachMenu T={T} A={A} lang={lang} onClose={()=>setFileMenu(false)} onPick={sendFile}/>}
              </div>

              <input ref={msgRef} className="mi" placeholder={activeChat.isAI?t("msgPlaceholderAI"):activeChat.isOwned&&activeChat.isChannel?t("msgPlaceholderCh"):t("msgPlaceholder")} value={msg}
                onChange={e=>setMsg(e.target.value.slice(0,MAX_MSG))}
                onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendMsg()}
                disabled={aiLoading||voiceRecording}
                style={{opacity:(aiLoading||voiceRecording)?0.4:1,display:voiceLocked?"none":"block"}}/>
              {/* Voice recording UI when locked */}
              {voiceLocked && (
                <div style={{flex:1,display:"flex",alignItems:"center",gap:"10px",background:A.main+"14",borderRadius:"14px",padding:"8px 14px",border:"1px solid "+A.main+"33"}}>
                  <span style={{fontSize:"13px",animation:"glowAnim 1s ease-in-out infinite",color:A.main}}>🔴</span>
                  <span style={{color:A.main,fontWeight:700,fontSize:"13px",fontVariantNumeric:"tabular-nums"}}>{fmtVoiceTime(voiceTimer)}</span>
                  <span style={{color:T.mu,fontSize:"11px",flex:1}}>Запись…</span>
                  <button onClick={cancelVoice}
                    style={{background:"rgba(248,113,113,0.15)",color:"#F87171",border:"1px solid rgba(248,113,113,0.3)",borderRadius:"10px",padding:"5px 10px",fontSize:"11px",fontWeight:700,cursor:"pointer"}}>
                    ✕ Отмена
                  </button>
                </div>
              )}
              {msg.length > MAX_MSG*0.8 && !voiceRecording && <div style={{position:"absolute",bottom:"22px",right:"66px",fontSize:"9px",fontWeight:700,color:msg.length>=MAX_MSG?"#F87171":T.mu,pointerEvents:"none"}}>{msg.length}/{MAX_MSG}</div>}

              {/* Send button — always visible when there's text */}
              {(msg.trim() || voiceLocked) && (
                <button style={{width:"44px",height:"44px",borderRadius:"50%",background:"linear-gradient(135deg,"+A.main+","+A.dark+")",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s",boxShadow:"0 4px 20px "+A.glow,opacity:aiLoading?0.5:1}}
                  onClick={()=>{ if(voiceLocked){stopVoice(true);}else{playClick();sendMsg();} }}
                  disabled={aiLoading}
                  onMouseEnter={e=>{e.currentTarget.style.filter="brightness(1.14)";}}
                  onMouseLeave={e=>e.currentTarget.style.filter=""}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                  </svg>
                </button>
              )}

              {/* Voice button — always visible, alongside send when text exists */}
              {!voiceLocked && (
                <button
                  style={{width:"44px",height:"44px",borderRadius:"50%",
                    background:voiceRecording?"linear-gradient(135deg,#EF4444,#DC2626)":T.in,
                    border:"1.5px solid "+(voiceRecording?"#EF4444":T.inB),
                    cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
                    transition:"all 0.2s",
                    boxShadow:voiceRecording?"0 4px 20px rgba(239,68,68,0.5)":"none",
                    position:"relative"
                  }}
                  onMouseEnter={e=>{if(!voiceRecording){e.currentTarget.style.borderColor=A.main;e.currentTarget.style.background=A.main+"18";}}}
                  onMouseLeave={e=>{if(!voiceRecording){e.currentTarget.style.borderColor=T.inB;e.currentTarget.style.background=T.in;}}}
                  onClick={()=>{ if(voiceRecording){setVoiceLocked(true);}else{startVoice();} }}
                  onTouchStart={e=>{e.preventDefault();startVoice();}}
                  onTouchEnd={e=>{e.preventDefault();if(voiceRecording){stopVoice(true);}}}
                  onTouchMove={e=>{
                    const touch=e.changedTouches[0];
                    const btn=e.currentTarget.getBoundingClientRect();
                    const dx=touch.clientX-(btn.left+btn.width/2);
                    const dy=touch.clientY-(btn.top+btn.height/2);
                    if(Math.sqrt(dx*dx+dy*dy)>60){cancelVoice();}
                  }}
                  title={voiceRecording?"Кликни чтобы закрепить запись":"Голосовое сообщение"}
                >
                  {voiceRecording ? (
                    <div style={{width:"13px",height:"13px",borderRadius:"3px",background:"#fff"}}/>
                  ) : (
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.su} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                      <rect x="9" y="2" width="6" height="12" rx="3"/>
                      <path d="M5 10a7 7 0 0014 0"/>
                      <line x1="12" y1="19" x2="12" y2="22"/>
                      <line x1="8" y1="22" x2="16" y2="22"/>
                    </svg>
                  )}
                  {voiceRecording && (
                    <div style={{position:"absolute",top:"-30px",left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,0.85)",color:"#fff",fontSize:"10px",fontWeight:700,padding:"3px 8px",borderRadius:"8px",whiteSpace:"nowrap",fontVariantNumeric:"tabular-nums",pointerEvents:"none"}}>
                      🔴 {fmtVoiceTime(voiceTimer)}
                    </div>
                  )}
                </button>
              )}
            </div>
          ) : (
            <div style={{paddingTop:"14px",paddingLeft:"16px",paddingRight:"16px",paddingBottom:"max(14px,env(safe-area-inset-bottom))",background:T.pa,borderTop:"1px solid "+T.bo,textAlign:"center",flexShrink:0}}>
              <span className="tag" style={{background:T.ca,color:T.mu,border:"1px solid "+T.caB,fontSize:"12px",fontWeight:600}}>{t("readOnly")}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
