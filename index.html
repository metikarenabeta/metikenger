<script>
// Service Worker через Blob — работает из локального файла
(function(){
  if(!('serviceWorker' in navigator)) return;
  const swCode = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
self.addEventListener('push', e => {
  if(!e.data) return;
  const d = e.data.json();
  e.waitUntil(self.registration.showNotification(d.title||'METIKENGER', {
    body: d.body||'',
    icon: d.icon||'',
    badge: d.badge||'',
    tag: d.tag||'msg',
    renotify: true,
    vibrate: [200,100,200],
    data: d.data||{}
  }));
});
self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(clients.matchAll({type:'window'}).then(cs=>{
    if(cs.length>0){ cs[0].focus(); return; }
    clients.openWindow('/');
  }));
});
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: '/'})
    .then(reg => {
      window._swReg = reg;
      console.log('SW registered');
    })
    .catch(e => console.log('SW reg failed (file://):', e.message));
})();
</script>

};

});
</script>
<script>
document.addEventListener("contextmenu", function(e) {
  if (!e.target.closest("[data-msg-bubble]")) {
    e.preventDefault();

});
(function(){
  // iOS Safari viewport height fix
  function setVH(){ document.documentElement.style.setProperty('--vh', (window.innerHeight*0.01)+'px'); }
  setVH();
  window.addEventListener('resize', setVH);
  window.addEventListener('orientationchange', function(){ setTimeout(setVH,200); });

  // iOS Safari AudioContext fix — must resume after user gesture
  document.addEventListener('touchstart', function resumeAudio(){
    if(window._audioCtx && window._audioCtx.state === 'suspended'){
      window._audioCtx.resume();
    }
  }, {once:false, passive:true});

  // Prevent iOS from killing the page when memory is low
  // Limit localStorage usage
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'hidden'){
      // Suspend AudioContext to free resources
      if(window._audioCtx && window._audioCtx.state === 'running'){
        window._audioCtx.suspend();
      }
    } else {
      if(window._audioCtx && window._audioCtx.state === 'suspended'){
        window._audioCtx.resume();
      }
    }
  });
})();
</script>

/* ── TOAST HOOK ── */
function useToast() {
  const [notif,setNotif] = React.useState("");
  const toast = React.useCallback(m=>{setNotif(m);setTimeout(()=>setNotif(""),3000);},[]);
  return {notif,toast};
}

/* ── GIFT MODAL ── */
function GiftModal({ T, A, straps, setStraps, balloonCount, appleCount, setGifts, setGModal, setTotalBoughtBalloon, setTotalBoughtApple, toast, lang, initialType }) {
  const t = k => (I18N[lang]||I18N.ru)[k] || k;
  const [step,     setStep]     = React.useState(0);
  const [qty,      setQty]      = React.useState(1);
  const [giftType, setGiftType] = React.useState(initialType||"balloon");

  const isBalloon = giftType === "balloon";
  const LIMIT     = isBalloon ? BALLOON_LIMIT : APPLE_LIMIT;
  const curCount  = isBalloon ? balloonCount : appleCount;
  const available = LIMIT - curCount;
  const priceEach = isBalloon ? 5 : 25;
  const emoji     = isBalloon ? "🎈" : "🍏";
  const giftName  = isBalloon ? t("giftBalloonName") : t("giftAppleName");
  const maxCanBuy = Math.min(isBalloon ? 50 : 20, Math.floor(straps / priceEach), available);
  const canBuyAny = maxCanBuy > 0;
  const totalCost = qty * priceEach;
  const canAfford = straps >= totalCost && (curCount + qty) <= LIMIT;

  function close() { setGModal(false); setStep(0); setQty(1); }

  function switchType(t) { setGiftType(t); setQty(1); setStep(0); }

  async function buyGifts() {
    if (!canAfford) return;
    const now = Date.now();
    const newGifts = Array.from({length: qty}, (_, i) => ({
      id: now + i, type: giftType, emoji, name: giftName,
      price: priceEach, acquiredAt: now, hidden: false,
      burnDeadline: now + 7*24*60*60*1000
    }));
    setStraps(s => s - totalCost);
    setGifts(g => [...g, ...newGifts]);
    // Читаем свежее значение из Firebase и атомарно увеличиваем
    try {
      const key = isBalloon ? "balloon" : "apple";
      const fresh = await fbGet("/shop_stats/"+key);
      const freshVal = (typeof fresh === "number" ? fresh : 0);
      const newTotal = freshVal + qty;
      await fbSet("/shop_stats/"+key, newTotal);
      if(isBalloon) setTotalBoughtBalloon(newTotal);
      else setTotalBoughtApple(newTotal);
    } catch(e) {
      // fallback
      if(isBalloon) setTotalBoughtBalloon(n => n + qty);
      else setTotalBoughtApple(n => n + qty);
    }
    close();
    toast(t("giftBought").replace("{qty}",qty).replace("{left}",available-qty));
  }

  return (
    <div className="mo" onClick={close}>
      <div className="mb" onClick={e=>e.stopPropagation()}>
        <div className="handle" style={{background:T.bo}}/>

        {/* Gift type selector tabs */}
        <div style={{display:"flex",gap:"8px",marginBottom:"20px",background:T.ca,borderRadius:"16px",padding:"5px",border:"1px solid "+T.caB}}>
          {[{id:"balloon",emoji:"🎈",label:t("giftBalloonLabel"),price:5},{id:"apple",emoji:"🍏",label:t("giftAppleLabel"),price:25}].map(opt=>(
            <button key={opt.id} onClick={()=>switchType(opt.id)}
              style={{flex:1,padding:"11px 8px",borderRadius:"12px",border:"none",cursor:"pointer",transition:"all 0.2s",
                background: giftType===opt.id ? "linear-gradient(135deg,"+A.main+","+A.dark+")" : "transparent",
                color: giftType===opt.id ? "#fff" : T.su,

  "UMBRELLA-VIP": { gift:{emoji:"☂️",name:"Зонт",price:67000,type:"umbrella"}, reward:"Подарок ☂️ Зонт (67 000 st)" },
  "NOHANDLE-4471": { once:true, gift:{emoji:"🌂",name:"Зонтик без ручки",price:67,type:"umbrella_no_handle"}, reward:"Подарок 🌂 Зонтик без ручки (67 st)" },

  "NOHANDLE-3357": { once:true, gift:{emoji:"🌂",name:"Зонтик без ручки",price:67,type:"umbrella_no_handle"}, reward:"Подарок 🌂 Зонтик без ручки (67 st)" },
  "MEGA-9911":     { once:true, straps:10000, reward:"💰 10 000 страпсов" },
};

function PromoCode({ T, A, onTitleUnlocked, onGiftUnlocked, onStrapsUnlocked }) {
  const [promoVal, setPromoVal] = React.useState("");
  const [promoState, setPromoState] = React.useState("idle");
  const [rewardMsg, setRewardMsg] = React.useState("");

  async function applyPromo() {
    const code = promoVal.trim().toUpperCase().replace(/\s+/g,"");
    if(!code) return;
    setPromoState("loading");
    const promoKey = Object.keys(PROMO_CODES).find(k=>k.toUpperCase()===code);
    const promo = promoKey ? PROMO_CODES[promoKey] : null;
    if(!promo) { setPromoState("error"); setTimeout(()=>setPromoState("idle"),2500); return; }
    const used = JSON.parse(localStorage.getItem("metik_used_promos")||"[]");
    if(used.includes(promoKey)) { setPromoState("used"); setTimeout(()=>setPromoState("idle"),2500); return; }
    // Для одноразовых промокодов — проверяем глобально в Firebase
    if(promo.once) {
      try {
        const globalUsed = await fbGet("/used_promos/"+promoKey);
        if(globalUsed) { setPromoState("used"); setTimeout(()=>setPromoState("idle"),2500); return; }
        // Помечаем как использованный глобально
        await fbSet("/used_promos/"+promoKey, {usedAt: Date.now()});
      } catch(e){}
    }
    localStorage.setItem("metik_used_promos", JSON.stringify([...used, promoKey]));
    setRewardMsg(promo.reward);
    setPromoState("ok");
    if(promo.title && onTitleUnlocked) onTitleUnlocked(promo.title);
    if(promo.gift && onGiftUnlocked) onGiftUnlocked({...promo.gift, id:"gift_"+Date.now(), acquiredAt:Date.now(), burnDeadline:Date.now()+7*24*60*60*1000});
    if(promo.straps && onStrapsUnlocked) onStrapsUnlocked(promo.straps);
  }

  return (
    <div style={{marginBottom:"20px",animation:"fadeIn 0.35s cubic-bezier(.16,1,.3,1) 0.1s both"}}>
      <div style={{color:T.mu,fontSize:"9px",fontWeight:800,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"10px",paddingLeft:"2px"}}>🎟️ ПРОМОКОД</div>
      <div style={{background:T.pa,border:"1px solid "+(promoState==="ok"?"#22C55E":promoState==="error"||promoState==="used"?"rgba(248,113,113,0.5)":T.bo),borderRadius:"20px",padding:"14px 16px",transition:"border-color 0.2s",boxShadow:promoState==="ok"?"0 0 0 3px rgba(34,197,94,0.15)":promoState==="error"?"0 0 0 3px rgba(248,113,113,0.1)":"none"}}>
        <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
          <input
            value={promoVal}
            onChange={e=>{ setPromoVal(e.target.value.slice(0,24)); setPromoState("idle"); }}
            onPaste={e=>{ setTimeout(()=>{ setPromoVal(e.target.value.slice(0,24)); setPromoState("idle"); },0); }}
            onKeyDown={e=>e.key==="Enter"&&applyPromo()}
            placeholder="Введи или вставь промокод..."
            className="pi"
            style={{flex:1,padding:"10px 14px",fontSize:"13px",fontWeight:600,letterSpacing:"1px",borderRadius:"14px"}}
            disabled={promoState==="loading"}
            autoCapitalize="none"
            autoCorrect="off"
            spellCheck={false}
          />
          <button onClick={applyPromo} disabled={!promoVal.trim()||promoState==="loading"||promoState==="ok"}
            className="gb"
            style={{padding:"10px 18px",fontSize:"13px",fontWeight:700,borderRadius:"14px",flexShrink:0,opacity:!promoVal.trim()?0.45:1,minHeight:"unset"}}>
            {promoState==="loading"?"...":"Применить"}
          </button>
        </div>
        {promoState==="error"&&<div style={{marginTop:"10px",display:"flex",alignItems:"center",gap:"8px",animation:"fadeUp 0.2s ease"}}><span>❌</span><span style={{color:"#F87171",fontSize:"12px",fontWeight:600}}>Промокод не найден или уже истёк</span></div>}
        {promoState==="used"&&<div style={{marginTop:"10px",display:"flex",alignItems:"center",gap:"8px",animation:"fadeUp 0.2s ease"}}><span>⚠️</span><span style={{color:"#F87171",fontSize:"12px",fontWeight:600}}>Этот промокод уже был использован</span></div>}
        {promoState==="ok"&&<div style={{marginTop:"10px",display:"flex",alignItems:"center",gap:"8px",animation:"fadeUp 0.2s ease"}}><span>🎉</span><span style={{color:"#22C55E",fontSize:"12px",fontWeight:700}}>Активирован! Получен: {rewardMsg}</span></div>}
        {promoState==="idle"&&<div style={{marginTop:"10px",display:"flex",alignItems:"center",gap:"6px"}}><span>🔒</span><span style={{color:T.mu,fontSize:"11px",fontWeight:500}}>Введи секретный код для получения наград</span></div>}
      </div>
    </div>
  );
}

/* ── GIFT DETAIL ── */
function GiftDetail({ T, A, giftDetail, setGiftDetail, setGifts, setStraps, toast, lang, user }) {
  const t = k => (I18N[lang]||I18N.ru)[k] || k;
  if (!giftDetail) return null;
  const g = giftDetail;
  const deadline = g.burnDeadline || (g.acquiredAt ? g.acquiredAt + 7*24*60*60*1000 : Date.now() + 7*24*60*60*1000);
  const canBurn = Date.now() < deadline;
  const daysLeft = Math.max(0, Math.ceil((deadline - Date.now())/(1000*60*60*24)));
  const burnReturn = Math.round(g.price * 0.9);
  function close() { setGiftDetail(null); }
  function toggleHide() {
    const u = {...g, hidden:!g.hidden};
    setGifts(p => p.map(x => x.id===g.id ? u : x));
    setGiftDetail(u);
    toast(g.hidden ? t("shownNow") : t("hiddenNow"));
  }
  function burnGift() {
    setGifts(p => {
      const newGifts = p.filter(x => x.id!==g.id);
      if(user?.username) fbSet("/accounts/"+user.username+"/gifts", newGifts);
      return newGifts;
    });
    setStraps(s => {
      const ns = s + burnReturn;
      if(user?.username) fbSet("/accounts/"+user.username+"/straps", ns);
      return ns;
    });
    close();
    toast("🔥 Подарок сожжён · +"+burnReturn+" straps");
  }
  return (
    <div className="mo" onClick={close}>
      <div className="mb" onClick={e=>e.stopPropagation()}>
        <div className="handle"/>
        <div style={{textAlign:"center",marginBottom:"24px"}}>
          <div className="ba" style={{fontSize:"72px",marginBottom:"14px",display:"block",filter:"drop-shadow(0 12px 24px rgba(0,0,0,0.28))"}}>{g.emoji}</div>
          <div style={{color:T.tx,fontWeight:800,fontSize:"24px",marginBottom:"12px",letterSpacing:"-0.4px"}}>{g.name}</div>
          <div style={{display:"flex",gap:"7px",justifyContent:"center",flexWrap:"wrap"}}>
            <span className="tag" style={{background:A.main+"22",color:A.main,border:"1px solid "+A.main+"33"}}>💰 {g.price} straps</span>
            <span className="tag" style={{background:T.ca,color:T.su,border:"1px solid "+T.caB}}>📅 {new Date(g.acquiredAt).toLocaleDateString("ru")}</span>
            {g.hidden && <span className="tag" style={{background:"rgba(120,120,120,0.12)",color:T.mu,border:"1px solid "+T.caB}}>🙈 Скрыт</span>}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"9px"}}>
          <button onClick={toggleHide} className="ghs" style={{width:"100%",padding:"13px",fontSize:"13px"}}>
            {g.hidden ? "👁 Показать всем" : "🙈 Скрыть"}
          </button>
          <button onClick={()=>toast("✨ Улучшение подарков — скоро!")}
            style={{width:"100%",padding:"13px",fontSize:"13px",fontWeight:700,borderRadius:"14px",
              background:"linear-gradient(135deg,"+A.main+"18,"+A.dark+"0c)",
              border:"1.5px solid "+A.main+"44",color:A.main,cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",transition:"all 0.2s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="linear-gradient(135deg,"+A.main+"28,"+A.dark+"18)";}}
            onMouseLeave={e=>{e.currentTarget.style.background="linear-gradient(135deg,"+A.main+"18,"+A.dark+"0c)";}}>
            <span style={{fontSize:"16px"}}>✨</span>
            <span>Улучшить</span>
            <span style={{fontSize:"9px",fontWeight:800,background:A.main+"22",border:"1px solid "+A.main+"33",borderRadius:"6px",padding:"2px 6px"}}>СКОРО</span>
          </button>
          {canBurn
            ? <button onClick={burnGift} style={{width:"100%",padding:"13px",fontSize:"13px",borderRadius:"14px",background:"rgba(239,68,68,0.08)",color:"#F87171",border:"1px solid rgba(239,68,68,0.22)",cursor:"pointer",fontWeight:700,transition:"all 0.18s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(239,68,68,0.15)";}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(239,68,68,0.08)";}}>
                🔥 Сжечь · ещё {daysLeft} {daysLeft===1?"день":daysLeft<5?"дня":"дней"}
              </button>
            : <div style={{background:"rgba(239,68,68,0.06)",borderRadius:"13px",padding:"12px",textAlign:"center",border:"1px solid rgba(239,68,68,0.15)"}}>
                <div style={{color:"#F87171",fontSize:"12px",fontWeight:700}}>🔒 Сжигание недоступно</div>
                <div style={{color:T.mu,fontSize:"11px",marginTop:"3px"}}>7 дней прошло — подарок навсегда твой</div>
              </div>
          }
        </div>
        <button onClick={close} style={{display:"block",width:"100%",padding:"12px",background:"none",border:"none",color:T.mu,cursor:"pointer",fontSize:"12px",marginTop:"12px",fontWeight:600}}>
          Закрыть
        </button>
      </div>
    </div>
  );
}

/* ── CREATE CHANNEL MODAL ── */
function CreateChannelModal({ T, A, setCreateChannel, setChats, toast, lang }) {
  const t = k => (I18N[lang]||I18N.ru)[k] || k;
  const [nm,   setNm]   = React.useState("");
  const [cid,  setCid]  = React.useState("");
  const [desc, setDesc] = React.useState("");
  const [av,   setAv]   = React.useState(null);
  const ref = React.useRef(null);

  function create() {
    if (!nm.trim()) { toast("⚠️ Введите название"); return; }
    if (!cid.trim()) { toast("⚠️ Введите ID канала"); return; }
    const cleanId = cid.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
    if (cleanId.length < 3) { toast("⚠️ ID мин. 3 символа (a-z, 0-9, _)"); return; }
    const emojis = ["📢","🌟","🔥","💫","🎯","🎵","⚡","🏆"];
    const nc = {
      id: Date.now(),
      name: nm.trim(),
      channelId: cleanId,
      avatar: av ? null : emojis[Math.floor(Math.random()*emojis.length)],
      avatarImg: av,
      color: UCOLORS[Math.floor(Math.random()*UCOLORS.length)],
      lastMsg: desc.trim() || t("channelCreated"),
      time: new Date().toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"}), unread:0, isChannel:true, isAI:false, isOwned:true, desc:desc.trim(),
      messages:[{id:1,from:"them",text:"📢 Канал «"+nm.trim()+"» создан!"+(desc.trim()?" — "+desc:""),time:new Date().toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"})}]
    };
    setChats(c=>[nc,...c]);
    setCreateChannel(false);
    toast("✅ Канал @"+cleanId+" создан!");
    // Публикуем канал в облако (аватарку сжимаем если большая)
    const pubAvImg = nc.avatarImg && nc.avatarImg.length < 50000 ? nc.avatarImg : null;
    fbSet("/channels/"+cleanId, {id:String(nc.id), name:nc.name, channelId:cleanId, desc:nc.desc, avatar:nc.avatar, avatarImg:pubAvImg, color:nc.color});
  }
  return (
    <div className="mo" onClick={()=>setCreateChannel(false)}>
      <div className="mb" onClick={e=>e.stopPropagation()}>
        <div className="handle"/>
        <div style={{color:T.tx,fontWeight:700,fontSize:"20px",marginBottom:"24px",letterSpacing:"-0.4px"}}>📢 Новый канал</div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:"22px"}}>
          <div onClick={()=>ref.current&&ref.current.click()}
            style={{width:"80px",height:"80px",borderRadius:"50%",background:av?"transparent":A.main+"20",
              border:"2px dashed "+A.main+"66",display:"flex",alignItems:"center",justifyContent:"center",
              cursor:"pointer",overflow:"hidden",marginBottom:"9px",transition:"all 0.2s"}}
            onMouseEnter={e=>{e.currentTarget.style.background=av?"transparent":A.main+"34";e.currentTarget.style.borderColor=A.main;}}
            onMouseLeave={e=>{e.currentTarget.style.background=av?"transparent":A.main+"20";e.currentTarget.style.borderColor=A.main+"66";}}>
            {av ? <img src={av} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{fontSize:"30px"}}>📷</span>}
          </div>
          <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>setAv(ev.target.result);r.readAsDataURL(f);}}}/>
          <span style={{color:T.mu,fontSize:"11px"}}>{t("clickForAvatar")}</span>
        </div>

        {/* НАЗВАНИЕ */}
        <div style={{marginBottom:"14px"}}>
          <div style={{color:T.mu,fontSize:"9px",fontWeight:700,letterSpacing:"1.5px",marginBottom:"7px",textTransform:"uppercase"}}>НАЗВАНИЕ *</div>
          <input className="pi" placeholder="Название канала..." value={nm} onChange={e=>setNm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&create()} style={{display:"block",width:"100%",padding:"12px 14px",fontSize:"13px"}}/>
        </div>

        {/* ID КАНАЛА */}
        <div style={{marginBottom:"14px"}}>
          <div style={{color:T.mu,fontSize:"9px",fontWeight:700,letterSpacing:"1.5px",marginBottom:"7px",textTransform:"uppercase"}}>ID КАНАЛА *</div>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:"13px",top:"50%",transform:"translateY(-50%)",color:T.mu,fontWeight:700,fontSize:"14px",pointerEvents:"none"}}>@</span>
            <input className="pi" placeholder="только a-z, 0-9, _" value={cid}
              onChange={e=>setCid(e.target.value.replace(/[^a-zA-Z0-9_]/g,"").toLowerCase())}
              onKeyDown={e=>e.key==="Enter"&&create()}
              style={{display:"block",width:"100%",padding:"12px 14px 12px 28px",fontSize:"13px"}}/>
          </div>
          <div style={{color:T.mu,fontSize:"10px",marginTop:"5px",paddingLeft:"2px"}}>Уникальный адрес · мин. 3 символа</div>
        </div>

        {/* ОПИСАНИЕ */}
        <div style={{marginBottom:"14px"}}>
          <div style={{color:T.mu,fontSize:"9px",fontWeight:700,letterSpacing:"1.5px",marginBottom:"7px",textTransform:"uppercase"}}>ОПИСАНИЕ</div>
          <textarea className="pi" placeholder="О чём ваш канал..." value={desc} onChange={e=>setDesc(e.target.value)} rows={3} style={{display:"block",width:"100%",padding:"12px 14px",fontSize:"13px",resize:"none",lineHeight:"1.55"}}/>
        </div>

        <div style={{display:"flex",gap:"10px",marginTop:"8px"}}>
          <button onClick={create} className="gb" style={{flex:1,padding:"14px",fontSize:"13px"}}>✅ Создать</button>
          <button onClick={()=>setCreateChannel(false)} className="ghs" style={{flex:1,padding:"14px",fontSize:"13px"}}>Отмена</button>
        </div>
      </div>
    </div>
  );
}

              {[
                chat.username?{icon:"👤",label:"Логин",val:"@"+chat.username,color:A.main}:null,
                {icon:"💬",label:"О себе",val:chat.bio||"Привет! Я использую METIKENGER",color:"#8B5CF6"},
                chat.phone?{icon:"📱",label:"Телефон",val:chat.phone,color:"#22C55E"}:null,

}

   5. Anti-clickjacking frame-bust
   6. Session token regenerated on every login
   7. File-size + MIME whitelist on uploads
   8. Message length cap (4 096 chars)
   ═══════════════════════════════════════════════════════════════ */

/* --- 1. Crypto helpers --- */
const _enc = new TextEncoder();
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", _enc.encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function genSalt(bytes=18) {
  return Array.from(crypto.getRandomValues(new Uint8Array(bytes)))
    .map(b=>b.toString(16).padStart(2,"0")).join("");
}
function genToken(bytes=32) {
  return Array.from(crypto.getRandomValues(new Uint8Array(bytes)))
    .map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function pbkdf2Hash(password, salt) {
  const keyMat = await crypto.subtle.importKey("raw", _enc.encode(password), "PBKDF2", false, ["deriveBits"]);
  const bits   = await crypto.subtle.deriveBits(
    { name:"PBKDF2", salt:_enc.encode(salt), iterations:100_000, hash:"SHA-256" },
    keyMat, 256
  );
  return Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* --- 2. Rate limiter --- */
const _rl = {};
function rlCheck(username, t) {
  const L = t || (k=>k);
  const now = Date.now(), k = username.toLowerCase();
  if (!_rl[k]) _rl[k] = { n:0, first:now, until:0 };
  const r = _rl[k];
  if (now < r.until) {
    const sec = Math.ceil((r.until - now)/1000);
    return { blocked:true, msg:L("errBlocked").replace("{n}",sec) };
  }
  if (now - r.first > 300_000) { r.n=0; r.first=now; }
  r.n++;
  if (r.n >= 5) {
    const wait = Math.min(30 * 2**(r.n-5), 3600);
    r.until = now + wait*1000;
    return { blocked:true, msg:L("errLockedOut").replace("{n}",wait) };
  }
  return { blocked:false };
}
function rlReset(username) { delete _rl[username.toLowerCase()]; }

/* --- 3. Input sanitization --- */
function sanitizeUsername(raw) {
  return String(raw).trim().toLowerCase().replace(/[^a-z0-9_]/g,"").slice(0,32);
}
function sanitizeDisplayName(s) {
  return String(s||"").replace(/[<>"'\u0060\\]/g,"").trim().slice(0,32);
}
function escapeHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#x27;");
}
function validatePassword(p) {
  if (!p) return 0;
  if (p.length > 128)      return "Пароль слишком длинный (макс. 128)";
  return null;
}
function pwStrength(p) {
  let s=0;
  if(p.length>=8)  s++;
  if(p.length>=12) s++;
  if(/[0-9]/.test(p)) s++;
  if(/[A-Z]/.test(p)) s++;
  if(/[^a-zA-Z0-9]/.test(p)) s++;
  return s; // 0..5
}

function fmtVoiceTime(s) {
  s = Math.max(0, Math.floor(s||0));
  return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
}

function VoiceBubble({src,dur,time,alignRight,acMain,timeColor}) {
  const {useState,useRef,useEffect} = React;
  const [playing,  setPlaying]  = useState(false);
  const [progress, setProgress] = useState(0);
  const [curSec,   setCurSec]   = useState(0);
  const [ready,    setReady]    = useState(false);
  const [errored,  setErrored]  = useState(false);
  const audioRef = useRef(null);
  const rafRef   = useRef(null);
  useEffect(()=>{
    if(!src) return;
    const audio = new Audio();
    audioRef.current = audio;
    audio.preload = "auto";
    const onReady = ()=>setReady(true);
    const onError = ()=>{ setErrored(true); setReady(false); };
    const onEnded = ()=>{ setPlaying(false); setProgress(0); setCurSec(0); cancelAnimationFrame(rafRef.current); };
    audio.addEventListener("canplay", onReady);
    audio.addEventListener("error",   onError);
    audio.addEventListener("ended",   onEnded);
    audio.src = src;
    audio.load();
    return ()=>{
      cancelAnimationFrame(rafRef.current);
      audio.pause();
      audio.removeEventListener("canplay", onReady);
      audio.removeEventListener("error",   onError);
      audio.removeEventListener("ended",   onEnded);
      audio.src = "";
    };
  },[src]);
  function tick(){
    const a=audioRef.current; if(!a) return;
    const d=a.duration||0;
    if(d>0){ setProgress(a.currentTime/d*100); setCurSec(a.currentTime); }
    if(!a.paused && !a.ended) rafRef.current=requestAnimationFrame(tick);
  }
  function togglePlay(){
    const a=audioRef.current; if(!a||!ready) return;
    if(playing){ a.pause(); cancelAnimationFrame(rafRef.current); setPlaying(false); }
    else {
      const p=a.play();
      if(p&&typeof p.then==="function"){
        p.then(()=>{ setPlaying(true); rafRef.current=requestAnimationFrame(tick); })
         .catch(()=>{ setErrored(true); setReady(false); });
      } else { setPlaying(true); rafRef.current=requestAnimationFrame(tick); }
    }
  }
  function seek(e){
    const a=audioRef.current; if(!a||!ready||!a.duration) return;
    const r=e.currentTarget.getBoundingClientRect();
    const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    a.currentTime=pct*a.duration; setProgress(pct*100); setCurSec(a.currentTime);
  }
  const totalSec=(ready&&audioRef.current&&audioRef.current.duration&&isFinite(audioRef.current.duration))?audioRef.current.duration:dur;
  const showTime=playing?fmtVoiceTime(curSec):fmtVoiceTime(totalSec);
  if(errored) return <div style={{color:timeColor,fontSize:"11px",opacity:0.5}}>🎙️ Ошибка</div>;
  return (
    <div style={{display:"flex",alignItems:"center",gap:"10px",minWidth:"200px",padding:"2px 2px 4px"}}>
      <button onClick={togglePlay}
        style={{width:"40px",height:"40px",borderRadius:"50%",flexShrink:0,border:"none",cursor:ready?"pointer":"default",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px",opacity:ready?1:0.45,
          background:alignRight?"rgba(255,255,255,0.22)":acMain+"28",transition:"transform 0.15s"}}
        onMouseEnter={e=>{if(ready)e.currentTarget.style.transform="scale(1.1)";}}
        onMouseLeave={e=>e.currentTarget.style.transform=""}>
        {playing?"⏸":"▶"}
      </button>
      <div style={{flex:1,minWidth:0}}>
        <div onClick={seek} style={{height:"4px",borderRadius:"2px",cursor:"pointer",marginBottom:"5px",
          background:alignRight?"rgba(255,255,255,0.2)":"rgba(128,128,128,0.2)",overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:"2px",background:alignRight?"rgba(255,255,255,0.9)":acMain,
            width:progress+"%",transition:playing?"none":"width 0.12s"}}/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
          <span style={{color:timeColor,fontSize:"10px",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{showTime}</span>
          <span style={{fontSize:"9px",opacity:0.4}}>🎙️</span>
        </div>
      </div>
      <div style={{color:timeColor,fontSize:"10px",fontWeight:600,alignSelf:"flex-end",whiteSpace:"nowrap",flexShrink:0}}>
        {time}{alignRight&&" ✓✓"}
      </div>
    </div>
  );
}

  try {
    const d = await fbGet("/presence/"+username);
    if(!d) return {online:false, lastSeen:0};
    return d;
  } catch(e){ return {online:false, lastSeen:0}; }
}

function isOnline(presence) {
  if(!presence) return false;
  // Если есть явный флаг — используем его
  if(typeof presence === "object") {
    if(!presence.online) return false;
    // Дополнительно проверяем что heartbeat свежий (< 2 мин)
    return (Date.now() - (presence.lastSeen||0)) < 2 * 60 * 1000;
  }
  // Fallback: старый формат (просто число)
  return (Date.now() - presence) < 3 * 60 * 1000;
}

function onlineLabel(presence) {
  if(!presence) return "не в сети";
  // Новый формат — объект {online, lastSeen}
  if(typeof presence === "object") {
    if(presence.online && (Date.now()-(presence.lastSeen||0)) < 2*60*1000) return "в сети";
    const diff = Date.now() - (presence.lastSeen||0);
    if(!presence.lastSeen) return "не в сети";
    if(diff < 60*60*1000){ const m=Math.floor(diff/60000); return "был(а) "+(m<1?"только что":m+" мин. назад"); }
    if(diff < 24*60*60*1000){ const h=Math.floor(diff/3600000); return "был(а) "+h+" ч. назад"; }
    return "не в сети";
  }
  // Старый формат — число
  const diff = Date.now() - presence;
  if(diff < 3*60*1000) return "в сети";
  if(diff < 60*60*1000){ const m=Math.floor(diff/60000); return "был(а) "+m+" мин. назад"; }
  if(diff < 24*60*60*1000){ const h=Math.floor(diff/3600000); return "был(а) "+h+" ч. назад"; }
  return "не в сети";
}

    avatarImg: c.avatarImg && c.avatarImg.length > 50000 ? null : c.avatarImg,
    messages: (c.messages||[]).slice(-50)
  }));
  await fbSet("/chats/" + username, slim);
  // Обновляем свои каналы в реестре каналов

  }
}

async function fbGetChats(username) {
  const d = await fbGet("/chats/" + username);
  if(!d) return [];
  const arr = Array.isArray(d) ? d.filter(Boolean) : Object.values(d).filter(Boolean);
  // Восстанавливаем порядок по _order если есть
  if(arr.length > 0 && arr[0]._order !== undefined) {
    arr.sort((a,b)=>(a._order||0)-(b._order||0));
  }
  // Гарантируем что у каждого чата есть массив messages
  return arr.map(c=>({...c, messages: Array.isArray(c.messages) ? c.messages : []}));
}

  React.useEffect(()=>{

  const [soundOn, setSoundOn] = useState(true);

  /* ── Audio engine (Web Audio API, no files needed) ── */
  const audioCtx = useRef(null);
  function getCtx() {
    if (!audioCtx.current) {
      try {
        audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
        window._audioCtx = audioCtx.current; // expose for visibilitychange handler
      } catch(e){}
    }
    // Resume if suspended (iOS Safari suspends after background)
    if(audioCtx.current && audioCtx.current.state === 'suspended'){
      audioCtx.current.resume().catch(()=>{});
    }
    return audioCtx.current;
  }
  function playClick() {
    if (!soundOn) return;
    try {
      const ctx = getCtx();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = "sine"; o.frequency.setValueAtTime(880, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.08);
      g.gain.setValueAtTime(0.18, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.09);
      o.start(); o.stop(ctx.currentTime + 0.09);
    } catch(e){}
  }
  function playMsg() {
    if (!soundOn) return;
    try {
      const ctx = getCtx();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = "sine"; o.frequency.setValueAtTime(660, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.12);
      g.gain.setValueAtTime(0.14, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.14);
      o.start(); o.stop(ctx.currentTime + 0.14);
    } catch(e){}
  }

  const [straps,    setStraps]    = useState(0);
  const [blockedContacts, setBlockedContacts] = useState([]); // array of chat ids
  const [chatMenuOpen,    setChatMenuOpen]    = useState(false); // three dots menu
  const [giftPickChat,    setGiftPickChat]    = useState(false); // gift picker for chat
  const [chatCtxMenu,     setChatCtxMenu]     = useState(null);  // {chat, x, y}
  const chatLongPressRef = React.useRef(null);
  const [gifts,     setGifts]     = useState([]);
  const [gModal,    setGModal]    = useState(false);
  const [totalBoughtBalloon, setTotalBoughtBalloon] = useState(0);
  const [totalBoughtApple,   setTotalBoughtApple]   = useState(0);

  // Загружаем глобальные счётчики магазина из Firebase
  React.useEffect(()=>{
    function loadStats(){
      fbGet("/shop_stats").then(stats=>{
        if(stats?.balloon !== undefined) setTotalBoughtBalloon(stats.balloon);
        if(stats?.apple   !== undefined) setTotalBoughtApple(stats.apple);
      }).catch(()=>{});
    }
    loadStats();
    const iv = setInterval(loadStats, 30000);
    return ()=>clearInterval(iv);
  },[user?.username]);
  const [giftDetail,setGiftDetail]= useState(null);
  const [rouletteSpinning, setRouletteSpinning] = useState(false);
  const [rouletteResult,   setRouletteResult]   = useState(null);
  const [drumIdx,          setDrumIdx]          = useState(0);

  // ── ЗВОНКИ (WebRTC) ──
  const [callState,    setCallState]    = useState(null); // null | "calling" | "incoming" | "active"
  const [callWith,     setCallWith]     = useState(null); // {username, displayName, avatar, color}
  const [callTimer,    setCallTimer]    = useState(0);
  const [callMuted,    setCallMuted]    = useState(false);
  const [callSpeaker,  setCallSpeaker]  = useState(true);
  const pcRef          = useRef(null);
  const localStreamRef = useRef(null);
  const remoteAudioRef = useRef(null);
  const callTimerRef   = useRef(null);
  const callRoomRef    = useRef(null);
  const [unlockedTitles, setUnlockedTitles] = useState([]);
  const [activeTitle, setActiveTitle] = useState("");

  // ── АВТО-ВХОД при перезагрузке страницы ──
  React.useEffect(()=>{
    // Фоллбэк — если Firebase завис, через 8 сек всё равно показываем экран входа
    const timeout = setTimeout(()=>setScreen(s=>s==="loading"?"auth":s), 8000);
    async function tryAutoLogin() {
      try {
        const saved = localStorage.getItem("metik_session");
        if(!saved){ setScreen("auth"); return; }
        const {username} = JSON.parse(saved);
        if(!username){ setScreen("auth"); return; }
        let acc = await fbGetAccount(username);
        if(!acc) acc = accounts.find(a=>a.username===username);
        if(!acc){ setScreen("auth"); return; }
        const savedChats = await fbGetChats(username);
        setStraps(acc.straps||0);
        setUnlockedTitles(acc.unlockedTitles||[]);
        setActiveTitle(acc.activeTitle||"");
        setGifts(acc.gifts||[]);
        setPrem(acc.prem||false);
        const loadedChats2 = (savedChats && savedChats.length>0) ? savedChats : (acc.savedChats&&acc.savedChats.length>0 ? acc.savedChats : []);
        if(loadedChats2.length > 0) {
          const savedIds2 = new Set(loadedChats2.map(c=>String(c.id)));
          const systemOnly2 = INIT_CHATS.filter(ic=>!savedIds2.has(String(ic.id)));
          const seenU2 = new Set();
          const deduped2 = [...loadedChats2, ...systemOnly2].filter(c=>{
            if(!c.username||c.isAI||c.isChannel||c.isGroup) return true;
            if(seenU2.has(c.username)) return false;
            seenU2.add(c.username); return true;
          });
          setChats(deduped2);
        }
        if(acc.thId) { setThId(acc.thId); try{localStorage.setItem("metik_thId",acc.thId);}catch(e){} }
        if(acc.acId) { setAcId(acc.acId); try{localStorage.setItem("metik_acId",acc.acId);}catch(e){} }
        if(acc.fontId){ setFontId(acc.fontId); try{localStorage.setItem("metik_fontId",acc.fontId);}catch(e){} }
        setUser(acc);
        setScreen("main");
        fbUpdateLastSeen(acc.username);
      } catch(e){ setScreen("auth"); }
      finally { clearTimeout(timeout); }
    }
    tryAutoLogin();
    return ()=>clearTimeout(timeout);
  }, []);

  // Авто-сохранение в Firebase и localStorage
  // Барабан рулетки
  React.useEffect(()=>{
    if(!rouletteSpinning){ setDrumIdx(0); return; }
    const iv = setInterval(()=>setDrumIdx(i=>(i+1)%15),100);
    return ()=>clearInterval(iv);
  },[rouletteSpinning]);

  // ── WebRTC ЗВОНКИ ──
  const ICE_SERVERS = {iceServers:[
    {urls:"stun:stun.l.google.com:19302"},
    {urls:"stun:stun1.l.google.com:19302"},
    {urls:"turn:global.relay.metered.ca:80",    username:"83b99e49e623ccab5b5e",credential:"m6OqZZ6x6KkHpFYZ"},
    {urls:"turn:global.relay.metered.ca:443",   username:"83b99e49e623ccab5b5e",credential:"m6OqZZ6x6KkHpFYZ"},
    {urls:"turns:global.relay.metered.ca:443?transport=tcp",username:"83b99e49e623ccab5b5e",credential:"m6OqZZ6x6KkHpFYZ"},
  ]};

  // Ждём пока ICE полностью собраны (надёжнее trickle для file://)
  function waitForIce(pc) {
    return new Promise(resolve => {
      if(pc.iceGatheringState === "complete") { resolve(); return; }
      const check = () => { if(pc.iceGatheringState==="complete"){ pc.removeEventListener("icegatheringstatechange",check); resolve(); } };
      pc.addEventListener("icegatheringstatechange", check);
      setTimeout(resolve, 4000); // максимум 4 сек
    });
  }

  async function startCall(acc) {
    if(callState) return;
    if(!acc || !acc.username){ toast("❌ Нельзя позвонить"); return; }
    try {
      toast("🎙️ Запрашиваем микрофон...");
      const stream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
      localStreamRef.current = stream;
      const roomId = [user.username, acc.username].sort().join("_");
      callRoomRef.current = roomId;

      // Чистим старую комнату
      await fbSet("/calls/"+roomId, null);
      await new Promise(r=>setTimeout(r,300));

      const pc = new RTCPeerConnection(ICE_SERVERS);
      pcRef.current = pc;
      stream.getTracks().forEach(t => pc.addTrack(t, stream));

      pc.ontrack = e => {
        if(remoteAudioRef.current && e.streams[0]) {
          remoteAudioRef.current.srcObject = e.streams[0];
          remoteAudioRef.current.play().catch(()=>{});
        }
      };
      pc.onconnectionstatechange = () => {
        if(pc.connectionState==="failed"||pc.connectionState==="disconnected") endCall();
      };

      const offer = await pc.createOffer({offerToReceiveAudio:true});
      await pc.setLocalDescription(offer);
      // Ждём полного сбора ICE
      await waitForIce(pc);

      const fullOffer = pc.localDescription;
      await fbSet("/calls/"+roomId, {
        caller: user.username, callerName: user.displayName||user.username,
        callerAvatar: user.avatar, callerColor: user.color||"#6366F1",
        callee: acc.username, status:"calling",
        offer: {type:fullOffer.type, sdp:fullOffer.sdp},
        createdAt: Date.now()
      });

      setCallWith({username:acc.username, displayName:acc.displayName||acc.name||acc.username, avatar:acc.avatar, color:acc.color});
      setCallState("calling");
      setCallTimer(0);

      // Ждём ответа
      let answered = false;
      const pollAnswer = setInterval(async()=>{
        try {
          const room = await fbGet("/calls/"+roomId);
          if(!room) { clearInterval(pollAnswer); if(!answered) endCall(roomId); return; }
          if(room.status==="rejected"||room.status==="ended") {
            clearInterval(pollAnswer); if(!answered) { toast("📵 Звонок отклонён"); endCall(roomId); }
            return;
          }
          if(room.status==="accepted" && room.answer && !answered) {
            answered = true;
            clearInterval(pollAnswer);
            await pc.setRemoteDescription(new RTCSessionDescription(room.answer));
            setCallState("active");
            startCallTimer();
          }
        } catch(e){}
      }, 1000);

      setTimeout(()=>{ if(!answered){ clearInterval(pollAnswer); toast("📵 Нет ответа"); endCall(roomId); } }, 45000);

    } catch(e) {
      toast("❌ Ошибка микрофона: "+e.message);
      cleanupCall();
    }
  }

  async function answerCall(roomId, callerInfo) {
    try {
      toast("🎙️ Подключаемся...");
      const stream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
      localStreamRef.current = stream;
      callRoomRef.current = roomId;

      const room = await fbGet("/calls/"+roomId);
      if(!room || !room.offer) { toast("❌ Звонок уже завершён"); cleanupCall(); return; }

      const pc = new RTCPeerConnection(ICE_SERVERS);
      pcRef.current = pc;
      stream.getTracks().forEach(t => pc.addTrack(t, stream));

      pc.ontrack = e => {
        if(remoteAudioRef.current && e.streams[0]) {
          remoteAudioRef.current.srcObject = e.streams[0];
          remoteAudioRef.current.play().catch(()=>{});
        }
      };
      pc.onconnectionstatechange = () => {
        if(pc.connectionState==="failed"||pc.connectionState==="disconnected") endCall();
      };

      await pc.setRemoteDescription(new RTCSessionDescription(room.offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      // Ждём полного сбора ICE
      await waitForIce(pc);

      const fullAnswer = pc.localDescription;
      await fbSet("/calls/"+roomId+"/answer", {type:fullAnswer.type, sdp:fullAnswer.sdp});
      await fbSet("/calls/"+roomId+"/status", "accepted");

      setCallState("active");
      setCallWith({username:callerInfo.username, displayName:callerInfo.displayName||callerInfo.username, avatar:callerInfo.avatar, color:callerInfo.color});
      startCallTimer();

    } catch(e) {
      toast("❌ Ошибка при ответе: "+e.message);
      cleanupCall();
    }
  }

  function startCallTimer() {
    setCallTimer(0);
    clearInterval(callTimerRef.current);
    callTimerRef.current = setInterval(()=>setCallTimer(t=>t+1), 1000);
  }

  function endCall(roomId) {
    const rid = roomId || callRoomRef.current;
    if(rid) { fbSet("/calls/"+rid+"/status","ended"); setTimeout(()=>fbSet("/calls/"+rid,null),3000); }
    cleanupCall();
  }

  function cleanupCall() {
    clearInterval(callTimerRef.current);
    if(pcRef.current){ try{pcRef.current.close();}catch(e){} pcRef.current=null; }
    if(localStreamRef.current){ localStreamRef.current.getTracks().forEach(t=>t.stop()); localStreamRef.current=null; }
    if(remoteAudioRef.current) remoteAudioRef.current.srcObject=null;
    callRoomRef.current=null;
    setCallState(null); setCallWith(null); setCallTimer(0); setCallMuted(false);
  }

  function toggleMute() {
    if(localStreamRef.current){
      const newMuted = !callMuted;
      localStreamRef.current.getAudioTracks().forEach(t=>t.enabled=!newMuted);
      setCallMuted(newMuted);
    }
  }

  function fmtCallTime(s){ const m=Math.floor(s/60); return (m<10?"0"+m:m)+":"+(s%60<10?"0"+(s%60):s%60); }

  // Polling входящих звонков
  React.useEffect(()=>{
    if(!user) return;
    const iv = setInterval(async()=>{
      if(callState) return;
      try {
        const allCalls = await fbGet("/calls");
        if(!allCalls) return;
        for(const [roomId, room] of Object.entries(allCalls)){
          if(room.callee===user.username && room.status==="calling" && (Date.now()-room.createdAt)<30000){
            setCallState("incoming");
            setCallWith({username:room.caller, displayName:room.callerName, avatar:room.callerAvatar, color:room.callerColor});
            callRoomRef.current = roomId;
            return;
          }
        }
      } catch(e){}
    },2000);
    return ()=>clearInterval(iv);
  },[user, callState]);

  // Присутствие — ставим online:true при входе, online:false при закрытии
  React.useEffect(()=>{
    if(!user) return;
    // Ставим онлайн
    fbSet("/presence/"+user.username, {online:true, lastSeen:Date.now()});
    // Heartbeat каждые 30 сек
    const iv = setInterval(()=>{
      fbSet("/presence/"+user.username, {online:true, lastSeen:Date.now()});

  function sendFile(e) {
    const file = e.target.files[0];
    if (!file || !chatId) return;
    e.target.value = "";
    if(file.size > MAX_FILE_MB * 1024 * 1024){ toast(t("fileTooBig")); return; }
    const isImg = ALLOWED_IMG_TYPES.has(file.type) || file.type.startsWith("image/");
    const reader = new FileReader();
    reader.onload = ev => {
      const timeLocale = lang==="en" ? "en" : "ru";
      const rawData = ev.target.result;

      const buildAndSend = (fileData) => {
        const nm = {
          id: Date.now(), from:"me",
          time: new Date().toLocaleTimeString(timeLocale,{hour:"2-digit",minute:"2-digit"}),
          replyTo: null,
          ...(isImg
            ? { text:"", fileType:"image", fileName:file.name, fileData }
            : { text:"📎 "+file.name, fileType:"file", fileName:file.name, fileSize: Math.round(file.size/1024)+"KB", fileData }
          )
        };
        setChats(c=>c.map(x=>String(x.id)===String(chatId)
          ? {...x, lastMsg: isImg?t("photoLabel"):"📎 "+file.name, time:nm.time, messages:[...x.messages,nm]}
          : x
        ));

        setTimeout(()=>bumpChat(chatId,null),10);
        toast(isImg?t("photoSent"):t("fileSent"));
        const ac = chats.find(c=>String(c.id)===String(chatId));
        if(ac) deliverToRecipient(ac, nm);
      };

      if(isImg) {
        // Сжимаем картинку до макс 600px и quality 0.7 перед отправкой
        const img = new Image();
        img.onload = () => {
          const MAX = 600;
          let w = img.width, h = img.height;
          if(w > MAX || h > MAX) {
            if(w > h) { h = Math.round(h * MAX/w); w = MAX; }
            else { w = Math.round(w * MAX/h); h = MAX; }
          }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          const compressed = canvas.toDataURL("image/jpeg", 0.7);
          buildAndSend(compressed);
        };
        img.onerror = () => buildAndSend(rawData);
        img.src = rawData;
      } else {
        // Для файлов не-картинок — только локально, без Firebase доставки (слишком большие)
        const nm = {
          id: Date.now(), from:"me",
          time: new Date().toLocaleTimeString(timeLocale,{hour:"2-digit",minute:"2-digit"}),

        };

  }

  function getSupportedMime() {

  async function startVoice() {
    if(voiceRecording) return;
    if(typeof MediaRecorder==="undefined"){ toast("🎙️ Браузер не поддерживает запись"); return; }
    try {
      const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,sampleRate:22050,channelCount:1}});
      streamRef.current=stream;
      audioChunksRef.current=[];
      const mime=getSupportedMime();
      const mr=new MediaRecorder(stream, mime?{mimeType:mime}:{});
      mr.ondataavailable=e=>{ if(e.data&&e.data.size>0) audioChunksRef.current.push(e.data); };
      mediaRecorderRef.current=mr;
      mr.start(250);
      // iOS: auto-stop after 60s to prevent memory crash
      setTimeout(()=>{ if(mediaRecorderRef.current&&mediaRecorderRef.current.state==="recording") stopVoice(true); }, 60000);
      voiceStartRef.current=Date.now();
      setVoiceRecording(true); setVoiceTimer(0); setVoiceLocked(false);
      voiceTimerRef.current=setInterval(()=>{
        const elapsed=Math.floor((Date.now()-voiceStartRef.current)/1000);
        setVoiceTimer(elapsed);
        // Auto-stop at 60s to prevent huge base64 blobs crashing mobile
        if(elapsed>=60){ stopVoice(true); }
      },500);
    } catch(e){ toast("🎙️ Нет доступа к микрофону"); }
  }
  function stopVoice(send=true) {
    if(!mediaRecorderRef.current) return;
    clearInterval(voiceTimerRef.current);
    const mr=mediaRecorderRef.current, startTime=voiceStartRef.current, cid=chatId;
    mr.onstop=()=>{
      if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
      if(!send||audioChunksRef.current.length===0){ audioChunksRef.current=[]; return; }
      const mimeType=mr.mimeType||"audio/webm";
      const blob=new Blob(audioChunksRef.current,{type:mimeType});
      audioChunksRef.current=[];
      const reader=new FileReader();
      reader.onload=ev=>{
        const dataUrl=ev.target.result;
        const dur=Math.max(1,Math.floor((Date.now()-startTime)/1000));
        const ac=chats.find(c=>String(c.id)===String(cid)); if(!ac) return;
        const timeLocale=lang==="en"?"en":"ru";
        const nm={id:Date.now(),from:"me",text:"🎙️ Голосовое",time:new Date().toLocaleTimeString(timeLocale,{hour:"2-digit",minute:"2-digit"}),fileType:"voice",fileData:dataUrl,voiceDuration:dur,senderName:(ac.isChannel||ac.isGroup)?(user.displayName||user.username):null};

      reader.readAsDataURL(blob);
    };
    // requestData + небольшая задержка перед stop чтобы последний чанк не обрезался
    if(mr.state==="recording") {
      mr.requestData();
      setTimeout(()=>{ if(mr.state==="recording") mr.stop(); }, 300);
    } else {
      mr.stop();
    }
    setVoiceRecording(false); setVoiceLocked(false); setVoiceTimer(0);
  }

      if(subscribedChannels.length===0) return;
      for(const ch of subscribedChannels) {
        try {
          const msgsData = await fbGet("/channel_msgs/"+ch.channelId);
          if(!msgsData) continue;
          const msgs = (Array.isArray(msgsData) ? msgsData.filter(Boolean) : Object.values(msgsData).filter(Boolean))
            .map(m=>({...m, from:"them"})); // все сообщения как "них" для подписчиков
          if(msgs.length===0) continue;
          setChats(prev=>prev.map(c=>{
            if(c.channelId!==ch.channelId) return c;
            const existIds = new Set((c.messages||[]).map(m=>String(m.id)));
            const newMsgs = msgs.filter(m=>!existIds.has(String(m.id)));
            if(newMsgs.length===0) return c;
            // Заменяем весь список — берём последние 100
            const all = [...msgs].slice(-100);
            const last = all[all.length-1];
            return {...c, messages:all, lastMsg:last.text||"📎", time:last.time||new Date().toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"}), unread:(c.unread||0)+newMsgs.length};
          }));
        } catch(e){}
      }
    }, 10000);
    return ()=>clearInterval(iv);
  },[user, chats.length]);

  // Поднять чат наверх списка
  function bumpChat(id, update) {
    setChats(prev => {
      const idx = prev.findIndex(c=>String(c.id)===String(id));
      if(idx < 0) return prev;
      const updated = update ? {...prev[idx], ...update} : prev[idx];
      return [updated, ...prev.filter((_,i)=>i!==idx)];
    });
  }

    const ch = chats.find(c=>String(c.id)===sid);

      fbGetLastSeen(ch.username).then(p=>setLastSeenCache(prev=>({...prev,[ch.username]:p})));

    if(authLoading) return;

    if(rawU.length<3){setFerr("Логин мин. 3 символа");return;}

    if(rawP.length<6){setFerr("Пароль мин. 6 символов");return;}
    if(rawP.length>128){setFerr("Пароль слишком длинный");return;}

    const salt = genSalt();
    const hash = await pbkdf2Hash(rawP, salt+"::"+u);

    const nu={
      username:u, passwordHash:hash, salt, sessionToken:token,
      avatar:u[0].toUpperCase(), color:UCOLORS[Math.floor(Math.random()*UCOLORS.length)],

    };

  async function doLog() {
    if(authLoading) return;
    const rawU=form.u.trim(), rawP=form.p.trim();
    if(!rawU||!rawP){setFerr(t("errFill"));return;}
    const u = sanitizeUsername(rawU);
    const rl = rlCheck(u, t);
    if(rl.blocked){setFerr(rl.msg);return;}
    setAuthLoading(true);
    const delay = ms => new Promise(r=>setTimeout(r,ms));
    setFerr("⏳ Входим...");

    // 1. Сначала пробуем Firebase
    let found = null;
    try { found = await fbGetAccount(u); } catch(e){}

    // 2. Fallback на localStorage если Firebase недоступен или аккаунт там не найден
    if(!found) {
      found = accounts.find(a=>a.username===u);
    }

    if(!found){
      await delay(420 + Math.random()*180);
      setFerr("❌ Аккаунт не найден. Если регистрировался давно — создай новый аккаунт.");
      setAuthLoading(false); return;
    }

    // Проверяем пароль
    let hash;
    if(found.salt){ hash = await pbkdf2Hash(rawP, found.salt+"::"+u); }
    else { hash = await sha256(rawP); }
    if(hash !== found.passwordHash){
      await delay(420 + Math.random()*180);
      setFerr(t("errWrong")); setAuthLoading(false); return;
    }

    let acc = found;
    // Апгрейд старого хэша
    if(!found.salt){
      const salt = genSalt();
      const newHash = await pbkdf2Hash(rawP, salt+"::"+u);
      acc = {...found, salt, passwordHash:newHash};
    }
    acc = {...acc, sessionToken:genToken()};

    // Загружаем чаты из Firebase
    let savedChats = [];
    try { savedChats = await fbGetChats(u); } catch(e){}

    // Мигрируем аккаунт в Firebase если его там не было
    try { await fbSaveAccount(acc); } catch(e){}

    // Обновляем локальный кэш
    setAccounts(a=>{
      const exists = a.find(x=>x.username===u);
      return exists ? a.map(x=>x.username===u?acc:x) : [...a,acc];
    });
    setStraps(acc.straps || 0);
    setUnlockedTitles(acc.unlockedTitles || []);
    setActiveTitle(acc.activeTitle || "");
    setGifts(acc.gifts || []);
    setPrem(acc.prem || false);
    const loadedChats = (savedChats && savedChats.length > 0) ? savedChats : (acc.savedChats && acc.savedChats.length > 0 ? acc.savedChats : []);
    if(loadedChats.length > 0) {
      // Мержим: сохранённые чаты + системные которых нет
      const savedIds = new Set(loadedChats.map(c=>String(c.id)));
      const systemOnly = INIT_CHATS.filter(ic=>!savedIds.has(String(ic.id)));
      // Дедупликация по username — оставляем первый (самый свежий) чат
      const seenUsernames = new Set();
      const deduped = [...loadedChats, ...systemOnly].filter(c => {
        if(!c.username || c.isAI || c.isChannel || c.isGroup) return true;
        if(seenUsernames.has(c.username)) return false;
        seenUsernames.add(c.username);
        return true;
      });
      setChats(deduped);
    }
    setUser(acc); setScreen("main"); setForm({u:"",name:"",p:"",p2:""}); setFerr(""); setAuthLoading(false);
    if(acc.thId){ setThId(acc.thId); try{localStorage.setItem("metik_thId",acc.thId);}catch(e){} }
    if(acc.acId){ setAcId(acc.acId); try{localStorage.setItem("metik_acId",acc.acId);}catch(e){} }
    if(acc.fontId){ setFontId(acc.fontId); try{localStorage.setItem("metik_fontId",acc.fontId);}catch(e){} }
    try { localStorage.setItem("metik_session", JSON.stringify({username: acc.username, sessionToken: acc.sessionToken})); } catch(e){}
    fbUpdateLastSeen(acc.username);
    rlReset(u);
  }

          async function callAI(model, maxTok) {
            const ctrl = new AbortController();
            const timer = setTimeout(()=>ctrl.abort(), 10000);
            try {
              const r = await fetch("https://text.pollinations.ai/openai",{
                method:"POST", signal:ctrl.signal,
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({model,max_tokens:maxTok||1200,messages:[sysmsg].concat(history)})
              });
              if(!r.ok) throw new Error("HTTP "+r.status);
              const d = await r.json();
              return d?.choices?.[0]?.message?.content || d?.choices?.[0]?.text || d?.content || d?.text || null;
            } finally { clearTimeout(timer); }
          }

          let reply = null;
          // Запускаем 3 попытки параллельно — берём первую успешную
          const attempts = [
            callAI("openai", 1200),
            new Promise(res=>setTimeout(()=>callAI("openai", 1200).then(res).catch(()=>res(null)), 1000)),
            new Promise(res=>setTimeout(()=>callAI("mistral", 1200).then(res).catch(()=>res(null)), 2000)),
          ];
          for(const p of attempts) {
            try {
              const r = await Promise.race([p, new Promise((_,rej)=>setTimeout(()=>rej(),12000))]);
              if(r && r.trim()) { reply = r; break; }
            } catch(e) {}
          }
          if(!reply || reply.trim()==="") {
            reply = "Что-то пошло не так, попробуй ещё раз 🔄";
          }
          const am = {id:Date.now()+1,from:"them",text:reply,time:new Date().toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"})};
          setChats(c=>c.map(x=>String(x.id)===String(chatId)?{...x,lastMsg:reply.slice(0,50),messages:[...x.messages,am].slice(-100)}:x));
        }
      } catch(e) {
        const crashReplies = [
          "Ой, я крашнулся 😭 Это кринж с моей стороны, извини. Попробуй ещё раз!",
          "Рофл, что-то пошло не так на моей стороне 😅 Сети нет или сервер лёг. Попробуй чуть позже!",
          "Братик, я завис 🤖 Обоюдно неприятно, но попробуй снова — должно сработать!",
        ];
        const errText = crashReplies[Math.floor(Math.random()*crashReplies.length)];
        const am = {id:Date.now()+1,from:"them",text:errText,time:new Date().toLocaleTimeString(lang==="en"?"en":"ru",{hour:"2-digit",minute:"2-digit"})};
        setChats(c=>c.map(x=>String(x.id)===String(chatId)?{...x,messages:[...x.messages,am].slice(-100)}:x));
      } finally {
        setAiLoading(false);
      }
    }

              {authMode==="register" && form.p.length>0 && (()=>{

                const colors=["#F87171","#F97316","#EAB308","#22C55E","#10B981","#10B981"];

                  <div style={{marginTop:"8px"}}>

                    <div style={{color:colors[str],fontSize:"11px",fontWeight:700}}>{labels[str]}</div>

            </div>

            {authMode==="register" && (
              <div>
                <div style={{color:"rgba(236,240,255,0.45)",fontSize:"11px",fontWeight:700,letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:"8px"}}>🔒 Повтори пароль</div>

                  style={{borderColor:form.p2&&form.p2!==form.p?"rgba(248,113,113,0.6)":undefined}}/>

                {form.p2 && form.p2===form.p && <div style={{color:"#22C55E",fontSize:"11px",fontWeight:700,marginTop:"5px"}}>✅ Пароли совпадают</div>}

            {ferr && (

    /* ─── MAIN ─── */
  return (

            <div style={{display:"flex",gap:"24px",justifyContent:"center",alignItems:"flex-end"}}>

              }
              return (
              <div onClick={e=>e.stopPropagation()} style={{position:"fixed",left:cx+"px",top:cy+"px",background:T.pa,border:"1px solid "+T.bo+"66",borderRadius:"20px",zIndex:1000,minWidth:W+"px",boxShadow:"0 32px 80px rgba(0,0,0,0.75),0 8px 24px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.06)",animation:"menuIn 0.22s cubic-bezier(.16,1,.3,1)",overflow:"hidden",WebkitBackdropFilter:"blur(48px)",backdropFilter:"blur(48px)",WebkitBackdropFilter:"blur(48px)"}}>
                {/* Accent top line */}
                <div style={{height:"2px",background:"linear-gradient(90deg,"+A.main+","+A.dark+",transparent)",opacity:0.7}}/>
                {/* Message preview strip */}
                {mm.msg.text && mm.msg.fileType!=="sticker" && (
                  <div style={{padding:"11px 15px 10px",borderBottom:"1px solid "+T.bo+"44",background:"linear-gradient(135deg,"+A.main+"08,transparent)"}}>
                    <div style={{color:A.main,fontSize:"9px",fontWeight:800,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"3px"}}>{mm.msg.from==="me"?"✦ Вы":"✦ Собеседник"}</div>
                    <div style={{color:T.su,fontSize:"12px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"180px",fontWeight:500}}>{mm.msg.text.slice(0,55)}{mm.msg.text.length>55?"…":""}</div>
                  </div>
                )}
                {[
                  {icon:"↩️",label:"Ответить",color:A.main,accent:true,fn:()=>{setReplyTo(mm.msg);setMsgMenu(null);}},
                  ...(mm.msg.text?[{icon:"📋",label:"Копировать",color:T.tx,accent:false,fn:()=>{navigator.clipboard&&navigator.clipboard.writeText(mm.msg.text||"");toast("📋 Скопировано");setMsgMenu(null);}}]:[]),
                  ...(mm.msg.from==="me"?[
                    {icon:"🗑️",label:"Удалить у себя",color:"#F87171",accent:false,del:true,fn:()=>{setChats(c=>c.map(x=>String(x.id)===String(chatId)?{...x,messages:(x.messages||[]).filter(mx=>mx.id!==mm.msg.id)}:x));setMsgMenu(null);toast("🗑️ Удалено");}},
                    {icon:"🗑️",label:"Удалить у всех",color:"#EF4444",accent:false,del:true,fn:()=>{setChats(c=>c.map(x=>String(x.id)===String(chatId)?{...x,messages:(x.messages||[]).filter(mx=>mx.id!==mm.msg.id)}:x));setMsgMenu(null);toast("🗑️ Удалено у всех");}},
                  ]:[
                    {icon:"🗑️",label:"Удалить у себя",color:"#F87171",accent:false,del:true,fn:()=>{setChats(c=>c.map(x=>String(x.id)===String(chatId)?{...x,messages:(x.messages||[]).filter(mx=>mx.id!==mm.msg.id)}:x));setMsgMenu(null);toast("🗑️ Удалено");}},
                  ])
                ].map((it,i,arr)=>(
                  <button key={i} onClick={it.fn}
                    style={{display:"flex",alignItems:"center",gap:"12px",width:"100%",padding:"12px 15px",background:"none",border:"none",cursor:"pointer",
                      borderBottom:i<arr.length-1?"1px solid "+T.bo+"28":"none",
                      color:it.color,fontSize:"13.5px",fontWeight:600,textAlign:"left",
                      transition:"background 0.15s,transform 0.12s",fontFamily:"inherit",
                      animation:"itemSlide 0.2s cubic-bezier(.16,1,.3,1) both",
                      animationDelay:(i*0.04)+"s"}}
                    onMouseEnter={e=>{e.currentTarget.style.background=it.del?"rgba(239,68,68,0.08)":it.accent?A.main+"10":T.caH;e.currentTarget.style.transform="translateX(2px)";}}
                    onMouseLeave={e=>{e.currentTarget.style.background="none";e.currentTarget.style.transform="";}}>
                    <div style={{
                      width:"34px",height:"34px",borderRadius:"11px",flexShrink:0,
                      background:it.del?"rgba(239,68,68,0.12)":it.accent?"linear-gradient(135deg,"+A.main+"30,"+A.dark+"18)":T.ca,
                      border:"1px solid "+(it.del?"rgba(239,68,68,0.2)":it.accent?A.main+"33":T.bo+"55"),
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:"15px",fontWeight:900,color:it.color,
                      boxShadow:it.accent?"0 4px 12px "+A.glow+"44":"none",
                      animation:"iconPop 0.25s cubic-bezier(.16,1,.3,1) both",
                      animationDelay:(i*0.04+0.05)+"s"
                    }}>{it.icon}</div>
                    <span style={{flex:1,letterSpacing:"0.1px"}}>{it.label}</span>
                    {it.accent&&<div style={{width:"6px",height:"6px",borderRadius:"50%",background:A.main,boxShadow:"0 0 8px "+A.glow,flexShrink:0}}/>}
                  </button>
                ))}
                {/* Bottom safe padding */}
                <div style={{height:"4px"}}/>
              </div>
              );
            })()}
            {aiLoading && (
              <div style={{display:"flex",justifyContent:"flex-start",animation:"fadeUp 0.2s ease"}}>
                <div style={{width:"36px",height:"36px",borderRadius:"50%",background:"linear-gradient(135deg,"+A.main+","+A.dark+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"15px",fontWeight:900,flexShrink:0,marginRight:"9px",alignSelf:"flex-end",boxShadow:"0 4px 16px "+A.glow}}>✦</div>
                <div style={{background:"linear-gradient(135deg,"+A.main+"18,"+A.dark+"0a)",borderRadius:"20px 20px 20px 4px",padding:"14px 18px",border:"1px solid "+A.main+"24",display:"flex",gap:"5px",alignItems:"center"}}>
                  <span className="d1" style={{width:"7px",height:"7px",borderRadius:"50%",background:A.main,display:"inline-block"}}/>
                  <span className="d2" style={{width:"7px",height:"7px",borderRadius:"50%",background:A.main,display:"inline-block"}}/>
                  <span className="d3" style={{width:"7px",height:"7px",borderRadius:"50%",background:A.main,display:"inline-block"}}/>
                </div>
              </div>
            )}
            <div ref={endRef}/>
          </div>

          {/* Reply preview */}
          {replyTo && (
            <div style={{padding:"10px 15px",background:T.pa,borderTop:"1px solid "+T.bo+"44",display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{flex:1,background:T.msg,borderRadius:"10px",padding:"8px 12px",borderLeft:"3px solid "+A.main}}>
                <div style={{color:A.main,fontSize:"11px",fontWeight:700,marginBottom:"2px"}}>{replyTo.from==="me"?"Вы":"ИИ"}</div>
                <div style={{color:T.su,fontSize:"12px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{replyTo.text.slice(0,70)}...</div>
              </div>
              <button className="ib" onClick={()=>setReplyTo(null)} style={{color:T.mu,width:"32px",height:"32px",fontSize:"18px"}}>×</button>
            </div>
          )}

          {/* Input */}
          {/* Баннер заблокирован */}
          {blockedContacts.includes(chatId) && (
            <div style={{padding:"14px 20px",background:T.pa,borderTop:"1px solid "+T.bo+"44",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"20px"}}>🚫</span>
                <span style={{color:T.mu,fontSize:"13px",fontWeight:600}}>Контакт заблокирован</span>
              </div>
              <button onClick={()=>{setBlockedChats(b=>b.filter(x=>x!==chatId));toast("✅ Разблокировано");}}
                style={{background:"rgba(34,197,94,0.1)",color:"#22C55E",border:"1px solid rgba(34,197,94,0.2)",borderRadius:"12px",padding:"8px 16px",fontSize:"12px",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                🔓 Разблокировать
              </button>
            </div>
          )}
          {(!activeChat.isChannel || activeChat.isOwned) && !blockedContacts.includes(chatId) ? (
            <div style={{paddingTop:"12px",paddingLeft:"14px",paddingRight:"14px",paddingBottom:"max(12px,env(safe-area-inset-bottom))",background:T.pa,borderTop:"1px solid "+T.bo,display:"flex",gap:"10px",alignItems:"center",flexShrink:0,position:"relative"}}>
              {/* hidden file input for direct use */}
              <input ref={fileInputRef} type="file" style={{display:"none"}} onChange={e=>{setFileMenu(false);sendFile(e);}}/>

              {/* Emoji button */}
              <div style={{position:"relative",flexShrink:0}}>
                <button onClick={()=>{setEmojiPanel(v=>!v);setFileMenu(false);}}
                  style={{width:"42px",height:"42px",borderRadius:"14px",border:"1.5px solid "+(emojiPanel?A.main:T.inB),background:emojiPanel?"linear-gradient(135deg,"+A.main+"22,"+A.dark+"12)":T.in,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",flexShrink:0,fontSize:"20px"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=A.main;}}
                  onMouseLeave={e=>{if(!emojiPanel)e.currentTarget.style.borderColor=T.inB;}}>
                  😊
                </button>
                {emojiPanel && (
                  <div onClick={e=>e.stopPropagation()} style={{position:"absolute",bottom:"52px",left:"0",background:T.pa,border:"1px solid "+T.bo,borderRadius:"20px",padding:"12px",zIndex:600,width:"300px",boxShadow:"0 -8px 40px rgba(0,0,0,0.5)",animation:"sheetUp 0.22s cubic-bezier(.16,1,.3,1)"}}>
                    <div style={{display:"flex",gap:"4px",marginBottom:"10px",background:T.ca,borderRadius:"12px",padding:"3px"}}>
                      {[{id:"emoji",label:"😊 Эмодзи"},...STICKER_PACKS.map(p=>({id:p.id,label:p.label}))].map(stab=>(
                        <button key={stab.id} onClick={()=>setEmojiTab(stab.id)}
                          style={{flex:1,padding:"5px 2px",borderRadius:"9px",border:"none",cursor:"pointer",fontSize:"10px",fontWeight:700,
                            background:emojiTab===stab.id?"linear-gradient(135deg,"+A.main+","+A.dark+")":"transparent",
                            color:emojiTab===stab.id?"#fff":T.mu,transition:"all 0.18s",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                          {stab.label}
                        </button>
                      ))}
                    </div>
                    {emojiTab==="emoji" ? (
                      <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:"4px"}}>
                        {["😀","😂","😅","😍","🥰","😎","🤩","🥳","😏","😢","😭","😤","🤬","😱","🤯","😳","😴","🤔","😎","👍","👎","❤️","🔥","✨","💯","🎉","🙏","👏","💪","🤝","🍕","🍔","🎮","🎵","🚀","⭐","💎","🌈","🦋","🐱"].map((em,i)=>(
                          <button key={i} onClick={()=>{setMsg(v=>(v+em).slice(0,MAX_MSG));setEmojiPanel(false);}}
                            style={{width:"30px",height:"30px",fontSize:"18px",background:"none",border:"none",cursor:"pointer",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.1s"}}
                            onMouseEnter={e=>e.currentTarget.style.background=T.caH}
                            onMouseLeave={e=>e.currentTarget.style.background="none"}>
                            {em}
                          </button>
                        ))}
                      </div>
                    ) : (
                      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"6px"}}>
                        {(STICKER_PACKS.find(p=>p.id===emojiTab)||STICKER_PACKS[0]).stickers.map((st,i)=>(
                          <button key={i} onClick={()=>sendSticker(st)}
                            style={{width:"48px",height:"48px",fontSize:"30px",background:T.ca,border:"1.5px solid "+T.caB,cursor:"pointer",borderRadius:"12px",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}
                            onMouseEnter={e=>{e.currentTarget.style.background=T.caH;e.currentTarget.style.transform="scale(1.18)";e.currentTarget.style.borderColor=A.main+"66";}}
                            onMouseLeave={e=>{e.currentTarget.style.background=T.ca;e.currentTarget.style.transform="scale(1)";e.currentTarget.style.borderColor=T.caB;}}>
                            {st}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* File attach button with popup menu */}
              <div style={{position:"relative",flexShrink:0}}>
                <button onClick={()=>{setFileMenu(v=>!v);setEmojiPanel(false);}}
                  style={{width:"42px",height:"42px",borderRadius:"14px",border:"1.5px solid "+(fileMenu?A.main:T.inB),background:fileMenu?"linear-gradient(135deg,"+A.main+"22,"+A.dark+"12)":T.in,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",flexShrink:0,position:"relative"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=A.main;e.currentTarget.style.background="linear-gradient(135deg,"+A.main+"18,"+A.dark+"0a)";}}
                  onMouseLeave={e=>{if(!fileMenu){e.currentTarget.style.borderColor=T.inB;e.currentTarget.style.background=T.in;}}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={fileMenu?A.main:T.su} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                  </svg>
                </button>
                {fileMenu && <FileAttachMenu T={T} A={A} lang={lang} onClose={()=>setFileMenu(false)} onPick={sendFile}/>}
              </div>

              <input ref={msgRef} className="mi" placeholder={activeChat.isAI?t("msgPlaceholderAI"):activeChat.isOwned&&activeChat.isChannel?t("msgPlaceholderCh"):t("msgPlaceholder")} value={msg}
                onChange={e=>setMsg(e.target.value.slice(0,MAX_MSG))}
                onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendMsg()}
                disabled={aiLoading||voiceRecording}
                style={{opacity:(aiLoading||voiceRecording)?0.5:1,display:voiceLocked?"none":"block"}}/>
              {voiceLocked && (
                <div style={{flex:1,display:"flex",alignItems:"center",gap:"8px",background:A.main+"14",borderRadius:"14px",padding:"8px 12px",border:"1px solid "+A.main+"33"}}>
                  <span style={{fontSize:"12px",color:"#F87171"}}>🔴</span>
                  <span style={{color:A.main,fontWeight:700,fontSize:"13px",fontVariantNumeric:"tabular-nums"}}>{fmtVoiceTime(voiceTimer)}</span>
                  <span style={{color:T.mu,fontSize:"11px",flex:1}}>Запись…</span>
                  <button onClick={cancelVoice} style={{background:"rgba(248,113,113,0.15)",color:"#F87171",border:"1px solid rgba(248,113,113,0.3)",borderRadius:"10px",padding:"4px 10px",fontSize:"11px",fontWeight:700,cursor:"pointer",minHeight:"unset"}}>✕</button>
                </div>
              )}
              {msg.length>MAX_MSG*0.8&&!voiceRecording&&<div style={{position:"absolute",bottom:"22px",right:"106px",fontSize:"9px",fontWeight:700,color:msg.length>=MAX_MSG?"#F87171":T.mu,pointerEvents:"none"}}>{msg.length}/{MAX_MSG}</div>}
              {(msg.trim()||voiceLocked)&&(
                <button style={{width:"44px",height:"44px",borderRadius:"50%",background:"linear-gradient(135deg,"+A.main+","+A.dark+")",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s",boxShadow:"0 4px 20px "+A.glow,opacity:aiLoading?0.5:1}}
                  onClick={()=>{ if(voiceLocked){stopVoice(true);}else{playClick();sendMsg();} }}
                  disabled={aiLoading}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                  </svg>
                </button>
              )}
              {!voiceLocked&&(
                <button
                  style={{width:"44px",height:"44px",borderRadius:"50%",
                    background:voiceRecording?"linear-gradient(135deg,#EF4444,#DC2626)":T.in,
                    border:"1.5px solid "+(voiceRecording?"#EF4444":T.inB),
                    cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                    flexShrink:0,transition:"all 0.2s",
                    boxShadow:voiceRecording?"0 4px 20px rgba(239,68,68,0.5)":"none",position:"relative"}}
                  onMouseEnter={e=>{if(!voiceRecording){e.currentTarget.style.borderColor=A.main;e.currentTarget.style.background=A.main+"18";}}}
                  onMouseLeave={e=>{if(!voiceRecording){e.currentTarget.style.borderColor=T.inB;e.currentTarget.style.background=T.in;}}}
                  onClick={()=>{ if(voiceRecording){setVoiceLocked(true);}else{startVoice();} }}
                  onTouchStart={e=>{e.preventDefault();startVoice();}}
                  onTouchEnd={e=>{e.preventDefault();if(voiceRecording)stopVoice(true);}}
                  onTouchMove={e=>{const t=e.changedTouches[0],b=e.currentTarget.getBoundingClientRect(),dx=t.clientX-(b.left+b.width/2),dy=t.clientY-(b.top+b.height/2);if(Math.sqrt(dx*dx+dy*dy)>60)cancelVoice();}}
                >
                  {voiceRecording?(
                    <div style={{width:"13px",height:"13px",borderRadius:"3px",background:"#fff"}}/>
                  ):(
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.su} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                      <rect x="9" y="2" width="6" height="12" rx="3"/>
                      <path d="M5 10a7 7 0 0014 0"/>
                      <line x1="12" y1="19" x2="12" y2="22"/>
                      <line x1="8" y1="22" x2="16" y2="22"/>
                    </svg>
                  )}
                  {voiceRecording&&<div style={{position:"absolute",top:"-28px",left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,0.85)",color:"#fff",fontSize:"10px",fontWeight:700,padding:"3px 8px",borderRadius:"8px",whiteSpace:"nowrap",pointerEvents:"none"}}>🔴 {fmtVoiceTime(voiceTimer)}</div>}
                </button>
              )}
            </div>
          ) : (
            <div style={{paddingTop:"14px",paddingLeft:"16px",paddingRight:"16px",paddingBottom:"max(14px,env(safe-area-inset-bottom))",background:T.pa,borderTop:"1px solid "+T.bo,textAlign:"center",flexShrink:0}}>
              <span className="tag" style={{background:T.ca,color:T.mu,border:"1px solid "+T.caB,fontSize:"12px",fontWeight:600}}>{t("readOnly")}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return {err:e};}
  componentDidCatch(e,i){console.error("REACT ERROR:",e,i);}
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{position:"fixed",inset:0,background:"#0a0010",color:"#ff6699",padding:"20px",fontFamily:"monospace",fontSize:"13px",overflow:"auto",whiteSpace:"pre-wrap",zIndex:99999}},
        "❌ REACT ERROR:\n\n"+this.state.err.toString()+"\n\nStack:\n"+(this.state.err.stack||"")
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary,null,React.createElement(App))
);
</script>
</body>
</html>
